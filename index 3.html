<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOANR</title>
<style>
body{margin:0;background:#0f1a0f;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:#1a2e1a;border-radius:16px;padding:32px 24px;width:90%;max-width:360px;border:1px solid #2a4a2a;text-align:center}
.logob{width:60px;height:60px;background:#2d6a2d;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;margin-bottom:16px}
h1{font-size:24px;margin-bottom:8px}
p{color:#88aa88;font-size:14px;margin-bottom:24px}
.fg{margin-bottom:16px;text-align:left}
label{font-size:13px;color:#aaa;display:block;margin-bottom:6px}
input{width:100%;background:#0f1a0f;border:1px solid #2a4a2a;color:#fff;padding:12px;border-radius:8px;font-size:16px;box-sizing:border-box}
button{width:100%;background:#2d6a2d;color:#fff;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:bold;margin-top:8px}
.err{background:#3a1a1a;border:1px solid #8a0000;color:#ff7070;padding:10px;border-radius:8px;margin-top:12px;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <div class="logob">B</div>
  <h1>BOANR</h1>
  <p>Gestion elevage bovin</p>
  <div class="fg">
    <label>Identifiant</label>
    <input type="text" id="lid" placeholder="ex: gerant">
  </div>
  <div class="fg">
    <label>Mot de passe</label>
    <input type="password" id="lpw">
  </div>
  <div id="err"></div>
  <button onclick="login()">Se connecter</button>
</div>

<script>
var USERS = {
  fondateur: 'boanr2026',
  gerant: 'terrain2026',
  rga: 'admin2026',
  fallou: 'marche2026'
};

function login() {
  var id = document.getElementById('lid').value.trim().toLowerCase();
  var pw = document.getElementById('lpw').value;
  if (USERS[id] && USERS[id] === pw) {
    document.body.innerHTML = '<div style="padding:20px;text-align:center"><div style="font-size:48px;margin-bottom:16px">✅</div><div style="font-size:20px;color:#4caf50">Connexion reussie !</div><div style="color:#88aa88;margin-top:8px">Bienvenue ' + id + '</div></div>';
  } else {
    document.getElementById('err').innerHTML = '<div class="err">Identifiant ou mot de passe incorrect</div>';
  }
}
</script>
</body>
</html>
