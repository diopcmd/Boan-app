// ── Export PDF KPI Dashboard ──
function exportKpiPDF(){
  if(typeof jsPDF === 'undefined' && typeof window.jspdf === 'undefined'){
    S.msg='err:jsPDF non chargé'; r(); return;
  }
  var doc = new (window.jspdf ? window.jspdf.jsPDF : jsPDF)({orientation:'portrait',unit:'mm',format:'a4'});
  var today = (function(){var n=_nowDakar();var mFR=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];return (n.day<10?'0':'')+n.day+' '+mFR[n.month-1]+' '+n.year;})();
  var sem = calcSemaine();
  var totalSemCycle = Math.round((CYCLE.dureeMois||8)*4.33);
  var pct = Math.round((sem/totalSemCycle)*100);
  var gmqL = LIVE.loaded&&LIVE.pesees.length
    ? Math.round(LIVE.pesees.reduce(function(s,p){return s+(p.gmq||0);},0)/LIVE.pesees.length*100)/100
    : MOCK.gmq;

  // ── En-tête ──
  doc.setFillColor(15,26,15);
  doc.rect(0,0,210,34,'F');
  doc.setTextColor(200,160,106);
  doc.setFontSize(18);
  doc.setFont(undefined,'bold');
  doc.text('BOANR — Rapport KPI', 14, 14);
  doc.setFontSize(9);
  doc.setFont(undefined,'normal');
  doc.setTextColor(136,170,136);
  doc.text('Élevage bovin engraissement — Thiès/Thiénaba, Sénégal', 14, 22);
  doc.text('Édité le '+today, 14, 28);
  doc.text('Semaine '+sem+' / 35  ('+pct+'% du cycle)', 130, 28);

  // ── Bloc infos cycle ──
  doc.setTextColor(30,30,30);
  doc.setFontSize(11);
  doc.setFont(undefined,'bold');
  doc.text('Informations du cycle', 14, 46);
  doc.setFont(undefined,'normal');
  doc.setFontSize(10);
  var infos = [
    ['Début du cycle', CYCLE.dateDebut ? isoToFr(CYCLE.dateDebut) : '—'],
    ['Nombre de bêtes', (CYCLE.nbBetes||4)+' têtes'],
    ['Race', CYCLE.race||'Djakoré'],
    ['Foirail', CYCLE.foirail||'Thiès'],
    ['Ration / j', (CYCLE.ration||12)+' kg/bête'],
    ['Capital investi', fmt(CYCLE.capital||1450000)+' FCFA'],
    ['Objectif prix', fmt(CYCLE.objectifPrix||2000)+' FCFA/kg'],
    ['Vétérinaire', CYCLE.veterinaire||'—'],
  ];
  var y = 54;
  infos.forEach(function(r,i){
    if(i%2===0){ doc.setFillColor(245,250,245); doc.rect(14,y-4,182,7,'F'); }
    doc.setTextColor(100,100,100);
    doc.text(r[0], 16, y);
    doc.setTextColor(30,30,30);
    doc.setFont(undefined,'bold');
    doc.text(r[1], 120, y);
    doc.setFont(undefined,'normal');
    y += 8;
  });

  // ── KPIs ──
  y += 4;
  doc.setFillColor(15,26,15);
  doc.rect(14,y,182,8,'F');
  doc.setTextColor(200,160,106);
  doc.setFontSize(11);
  doc.setFont(undefined,'bold');
  doc.text('KPIs Principaux', 16, y+5.5);
  y += 12;

  var kpis = [
    ['Bêtes actives', MOCK.betes+' / '+(CYCLE.nbBetes||4), MOCK.betes>=(CYCLE.nbBetes||4)],
    ['GMQ moyen', gmqL+' kg/j', gmqL>=1.0],
    ['Stock aliments', MOCK.stock+' semaines', MOCK.stock>=6],
    ['Trésorerie', Math.round(MOCK.treso/1000)+'k FCFA', MOCK.treso>=600000],
    ['Avancement cycle', pct+'% (Sem. '+sem+'/'+totalSemCycle+')', pct>=0],
  ];
  kpis.forEach(function(k,i){
    if(i%2===0){ doc.setFillColor(245,250,245); doc.rect(14,y-4,182,7,'F'); }
    doc.setTextColor(80,80,80);
    doc.setFont(undefined,'normal');
    doc.text(k[0], 16, y);
    doc.setTextColor(k[2] ? 34 : 180, k[2] ? 120 : 50, k[2] ? 34 : 50);
    doc.setFont(undefined,'bold');
    doc.text(k[1], 120, y);
    doc.setFont(undefined,'normal');
    doc.text(k[2] ? '✓ OK' : '⚠ Attention', 180, y);
    y += 8;
  });

  // ── Synthèse stock ──
  y += 8;
  // Nouvelle page si nécessaire
  if(y > 220) { doc.addPage(); y = 20; }

  doc.setFillColor(15,26,15);
  doc.rect(14,y,182,8,'F');
  doc.setTextColor(200,160,106);
  doc.setFontSize(11);
  doc.setFont(undefined,'bold');
  doc.text('Synthèse Stock du Cycle', 16, y+5.5);
  y += 12;

  var ajouts={}, consos={};
  (STOCK_MVTS||[]).forEach(function(m){
    var kg = parseFloat(m.kg)||0;
    if(m.mode==='consommer') consos[m.type]=(consos[m.type]||0)+kg;
    else ajouts[m.type]=(ajouts[m.type]||0)+kg;
  });
  var allT = Object.keys(Object.assign({},ajouts,consos)).sort();

  if(allT.length===0){
    doc.setTextColor(130,130,130);
    doc.setFont(undefined,'normal');
    doc.setFontSize(10);
    doc.text('Aucun mouvement de stock enregistré ce cycle.', 16, y);
    y += 10;
  } else {
    // En-tête tableau
    doc.setFillColor(230,240,230);
    doc.rect(14,y-4,182,8,'F');
    doc.setTextColor(60,60,60);
    doc.setFontSize(9);
    doc.setFont(undefined,'bold');
    doc.text('Aliment',   16, y);
    doc.text('Ajouté',   105, y, {align:'right'});
    doc.text('Consommé', 145, y, {align:'right'});
    doc.text('Stock net', 193, y, {align:'right'});
    doc.setFont(undefined,'normal');
    y += 9;
    var totalA=0, totalC=0;
    allT.forEach(function(t,i){
      // Nouvelle page si nécessaire
      if(y > 270) { doc.addPage(); y = 20; }
      var a=ajouts[t]||0, c=consos[t]||0, net=a-c;
      totalA+=a; totalC+=c;
      if(i%2===0){ doc.setFillColor(248,252,248); doc.rect(14,y-4,182,8,'F'); }
      doc.setTextColor(30,30,30);
      doc.setFontSize(10);
      doc.text(t, 16, y);
      doc.setTextColor(34,120,34);
      doc.text('+'+(a||0)+' kg', 105, y, {align:'right'});
      doc.setTextColor(180,50,50);
      doc.text((c>0?'-':'')+c+' kg', 145, y, {align:'right'});
      doc.setTextColor(net>=0?20:180, net>=0?100:50, net>=0?20:50);
      doc.setFont(undefined,'bold');
      doc.text((net>=0?'+':'')+net+' kg', 193, y, {align:'right'});
      doc.setFont(undefined,'normal');
      y += 9;
    });
    // Ligne total
    if(y > 270) { doc.addPage(); y = 20; }
    var totalNet = totalA-totalC;
    doc.setFillColor(15,26,15);
    doc.rect(14,y-4,182,8,'F');
    doc.setTextColor(200,160,106);
    doc.setFont(undefined,'bold');
    doc.text('TOTAL', 16, y);
    doc.text('+'+totalA+' kg', 105, y, {align:'right'});
    doc.text('-'+totalC+' kg', 145, y, {align:'right'});
    doc.setTextColor(totalNet>=0?200:220, totalNet>=0?160:80, totalNet>=0?106:80);
    doc.text((totalNet>=0?'+':'')+totalNet+' kg', 193, y, {align:'right'});
    y += 12;
  }

  // ── Pied de page (toutes les pages) ──
  var pageCount = doc.internal.getNumberOfPages();
  for(var p=1; p<=pageCount; p++){
    doc.setPage(p);
    doc.setTextColor(136,136,136);
    doc.setFont(undefined,'normal');
    doc.setFontSize(8);
    doc.text('BOANR — boan-app.vercel.app  |  Page '+p+'/'+pageCount, 105, 290, {align:'center'});
  }

  var fname = 'BOANR_KPI_Sem'+sem+'_'+today.replace(/ /g,'-')+'.pdf';
  doc.save(fname);
  S.msg = 'ok:PDF téléchargé'; r();
}

// ── Rapport du jour WhatsApp (gérant → fondateur) ──
function partagerRapportJourWhatsApp(){
  var _td = today();
  var _n = _nowDakar();
  var dayFR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'][_n.weekday || new Date().getDay()];
  var mFR   = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  var dateLabel = dayFR+' '+(_n.day<10?'0':'')+_n.day+' '+mFR[_n.month-1]+' '+_n.year;

  var aujourdHui = HISTORY.filter(function(h){ return h.date === _td; });
  var fiche      = aujourdHui.find(function(h){ return h.type==='fiche'; });
  var sop        = aujourdHui.find(function(h){ return h.type==='sop'; });
  var incidents  = aujourdHui.filter(function(h){ return h.type==='inc'; });
  var santes     = aujourdHui.filter(function(h){ return h.type==='sante'; });
  var pesees     = HISTORY.filter(function(h){ return h.type==='pesee' && h.date===_td; });
  var stocks     = aujourdHui.filter(function(h){ return h.type==='stock'; });

  var lines = [
    '🐄 *BOANR — Rapport du jour*',
    '📅 '+dateLabel+' — Sem. '+calcSemaine(),
    '─────────────────────',
    '📋 Fiche journalière : '+(fiche ? '✅ Soumise' : '❌ Non soumise'),
    '✅ Checklist SOP : '+(sop ? '✅ Validée' : '❌ Non validée'),
    '📦 Stock : '+(stocks.length ? '✅ Mis à jour' : '— Pas de mouvement')
  ];

  lines.push('🐮 Bêtes actives : *'+MOCK.betes+' / '+(CYCLE.nbBetes||4)+'*');
  var stkDisplay = MOCK.stock > 0 ? MOCK.stock : calcStockLocal();
  lines.push('🌾 Stock aliments : *'+stkDisplay+' semaines*'+(stkDisplay>=6?' ✅':stkDisplay>=4?' ⚠️':' 🔴'));

  if (incidents.length > 0) {
    lines.push('─────────────────────');
    lines.push('*⚠️ Incidents du jour ('+incidents.length+') :*');
    incidents.forEach(function(inc){ lines.push('• '+inc.label); });
  } else {
    lines.push('🟢 Aucun incident aujourd\'hui');
  }

  if (pesees.length > 0) {
    lines.push('*⚖️ Pesées ('+pesees.length+') :*');
    pesees.forEach(function(p){ lines.push('• '+p.label); });
  }

  if (santes.length > 0) {
    lines.push('*💊 Santé / Mortalité :*');
    santes.forEach(function(s){ lines.push('• '+s.label); });
  }

  lines.push('─────────────────────');
  lines.push('_Généré par BOANR_');

  var msg = encodeURIComponent(lines.join('\n'));
  window.open('https://wa.me/?text='+msg, '_blank');
}

  doc.text('Ration journalière : '+(CYCLE.ration||12)+' kg/bête', 14, 54);

  // Agréger mouvements
  var ajouts = {}, consos = {};
  STOCK_MVTS.forEach(function(m){
    if(m.mode === 'consommer') consos[m.type] = (consos[m.type]||0) + (parseFloat(m.kg)||0);
    else ajouts[m.type] = (ajouts[m.type]||0) + (parseFloat(m.kg)||0);
  });
  var allTypes = Object.keys(Object.assign({}, ajouts, consos)).sort();

  // Tableau synthèse
  var startY = 64;
  doc.setFillColor(15,26,15);
  doc.rect(14, startY, 182, 8, 'F');
  doc.setTextColor(200,160,106);
  doc.setFontSize(9);

    y += 9;
  });

  // Total

  doc.setFillColor(15,26,15);

  doc.setTextColor(200,160,106);

}

// ── Partage WhatsApp de la synthèse ──
function partagerSyntheseWhatsApp(){
  var ajouts = {}, consos = {};
  STOCK_MVTS.forEach(function(m){
    if(m.mode === 'consommer') consos[m.type] = (consos[m.type]||0) + (parseFloat(m.kg)||0);
    else ajouts[m.type] = (ajouts[m.type]||0) + (parseFloat(m.kg)||0);
  });
  var allTypes = Object.keys(Object.assign({}, ajouts, consos)).sort();
  var today = (function(){var n=_nowDakar();var mFR=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];return (n.day<10?'0':'')+n.day+' '+mFR[n.month-1]+' '+n.year;})();
  var debut = CYCLE.dateDebut ? isoToFr(CYCLE.dateDebut) : '—';

  var lines = ['🐄 *BOANR — Synthèse Stock Alimentaire*'];
  lines.push('📅 Cycle depuis le : '+debut);
  lines.push('📆 Édité le : '+today);
  lines.push('─────────────────────');
  lines.push('*Aliment | Ajouté | Consommé | Net*');

  allTypes.forEach(function(t){
    var a = ajouts[t]||0, c = consos[t]||0, net = a-c;
    var netStr = (net>=0?'+':'')+net+' kg';
    lines.push('• '+t+' : +'+(a||0)+' kg / -'+(c||0)+' kg / Net: '+netStr);
  });

  var totalA = Object.values(ajouts).reduce(function(s,v){return s+v;},0);
  var totalC = Object.values(consos).reduce(function(s,v){return s+v;},0);
  var totalNet = totalA - totalC;
  lines.push('─────────────────────');
  lines.push('*TOTAL : +'+(totalA)+' kg ajouté / -'+totalC+' kg consommé / Net: '+(totalNet>=0?'+':'')+totalNet+' kg*');
  lines.push('');
  lines.push('_Généré par BOANR_');

  var msg = encodeURIComponent(lines.join('\n'));
  window.open('https://wa.me/?text='+msg, '_blank');
}

function saveCycle(){
  // Résoudre les races custom avant sauvegarde
  if (MODAL.data.betes) {
    MODAL.data.betes = MODAL.data.betes.map(function(b){
      return Object.assign({}, b, {
        race: (b.race==='Autre' && b.raceCustom) ? b.raceCustom : b.race
      });
    });
  }
  CYCLE = Object.assign(CYCLE, MODAL.data, {initialized:true});
  // Réinitialiser les mouvements de stock au démarrage d'un nouveau cycle
  STOCK_MVTS = [];
  saveMvts();
  lsSet('cycle', CYCLE);
  MOCK.betes = CYCLE.nbBetes || MOCK.betes;
  MOCK.sem = 1; // Nouveau cycle démarre à la semaine 1
  MOCK.stock = 0; // Réinitialiser stock — sera recalculé depuis stockLines ou Sheets
  // Calculer semaines de stock depuis stockLines (stock initial du cycle)
  var stockTotalKg = (CYCLE.stockLines||[]).reduce(function(s,x){return s+(parseFloat(x.kg)||0);},0);
  if (CYCLE.ration && CYCLE.nbBetes) {
    var rationJour = CYCLE.ration * CYCLE.nbBetes;
    if (rationJour > 0 && stockTotalKg > 0) {
      MOCK.stock = Math.round((stockTotalKg / (rationJour * 7)) * 10) / 10;
    }
  }
  // Initialiser STOCK_MVTS avec les stocks initiaux comme ajouts de départ
  if ((CYCLE.stockLines||[]).length > 0) {
    var cycleDebut = CYCLE.dateDebut || todayISO();
    STOCK_MVTS = [];
    CYCLE.stockLines.forEach(function(s) {
      var kg = parseFloat(s.kg) || 0;
      if (kg > 0) STOCK_MVTS.push({ date: isoToFr(cycleDebut), type: s.type, mode: 'ajouter', kg: kg, cycleDebut: cycleDebut });
    });
    saveMvts();
  }
  // Réinitialiser les valeurs du simulateur pour refléter le nouveau cycle
  S.sn = null; S.sp = null; S.spx = null; S.sveau = null;
  // Réinitialiser l'onglet actif pour éviter un état incohérent après reset cycle
  S.tab = USERS[S.user] && USERS[S.user].tabs ? USERS[S.user].tabs[0] : 'dashboard';
  S.sub = '';
  MODAL.open = false;
  // Passer à l'app après validation
  S.page = 'app';

  // ── Reset complet de l'état local (synchrone) ──
  HISTORY = [];
  lsSet('history', []);
  lsSet('last_fiche', null); // effacer le marqueur localStorage de fiche du jour
  // Vider les dates du cycle précédent (sinon elles polluent Config_App + joursSince)
  CYCLE._lastFicheDate  = '';
  CYCLE._lastSopDate    = '';
  CYCLE._lastStockDate  = '';
  CYCLE._lastPeseeDate  = '';
  CYCLE._lastIncDate    = '';
  CYCLE._lastSanteDate  = '';
  CYCLE._lastBilanSem   = '';
  lsSet('cycle', CYCLE);
  LIVE.pesees    = [];
  LIVE.beteIds   = [];
  LIVE.incidents = [];
  LIVE.loaded    = false;
  LIVE.source    = 'loading';
  MOCK.gmq       = 1.1;
  MOCK.incidents = 0;
  MOCK.treso     = CYCLE.capital || 0;
  MOCK._tresoFromSante = null;
  _lastSyncTS      = 0;
  _lastFondVisitTS = 0;
  lsSet('fondateur_last_visit', 0);
  // MOCK.betes et MOCK.stock déjà mis à jour plus haut dans saveCycle()
  r();

  // ── Écriture Sheets + vidage données ancien cycle ──
  getTok().then(function(tk){
    if (!tk) { LIVE.source = 'cache'; r(); return; }

    // 1. Écrire Config_Cycle dans TOUS les sheets (gerant, fondateur, rga, fallou)
    var vals = [
      CYCLE.dateDebut, CYCLE.nbBetes, CYCLE.poidsDepart, CYCLE.race, CYCLE.ration,
      CYCLE.capital, CYCLE.objectifPrix, CYCLE.budgetSante, CYCLE.veterinaire,
      CYCLE.foirail, CYCLE.commission, CYCLE.contactUrgence, CYCLE.peseeFreq,
      JSON.stringify(CYCLE.betes||[]),
      JSON.stringify(CYCLE.stockLines||[]),
      CYCLE.dureeMois  // col P (index 15)
    ];
    var allSids = [SID.fondateur, SID.gerant, SID.rga, SID.fallou].filter(Boolean);
    allSids.forEach(function(sid){
      var _ccEnc = encodeURIComponent('Config_Cycle');
      var url = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+_ccEnc+'!A1?valueInputOption=USER_ENTERED';
      fetch(url, {method:'PUT', headers:{Authorization:'Bearer '+tk, 'Content-Type':'application/json'}, body:JSON.stringify({values:[vals]})});
    });

    // 2. Vider les onglets de saisie dans les sheets gérant ET fondateur (lignes 4+)
    //    Les 3 premières lignes (en-têtes/légendes/formatage) sont préservées
    var dataOnglets = [
      'Fiche_Quotidienne!A4:Z500',
      'SOP_Check!A4:Z200',
      'Stock_Nourriture!A5:Z500',
      'Incidents!A5:Z200',
      'Pesees!A4:Z200',
      'Sante_Mortalite!A5:Z200',
      'Hebdomadaire!A4:Z200',
    ];
    var kpiOnglets = [
      'KPI_Mensuels!A4:Z50',
      'KPI_Hebdo!A4:Z50',
    ];
    var clearPromises = [];
    // Vider données dans sheet gérant + fondateur
    [SID.gerant, SID.fondateur].filter(Boolean).forEach(function(sid) {
      dataOnglets.forEach(function(range) {
        var parts = range.split('!');
        var enc = encodeURIComponent(parts[0]) + '!' + parts[1];
        var url = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+enc+':clear';
        clearPromises.push(fetch(url, {method:'POST', headers:{Authorization:'Bearer '+tk, 'Content-Type':'application/json'}}));
      });
    });
    // Vider KPI uniquement dans sheet fondateur
    if (SID.fondateur) {
      kpiOnglets.forEach(function(range) {
        var parts = range.split('!');
        var enc = encodeURIComponent(parts[0]) + '!' + parts[1];
        var url = 'https://sheets.googleapis.com/v4/spreadsheets/'+SID.fondateur+'/values/'+enc+':clear';
        clearPromises.push(fetch(url, {method:'POST', headers:{Authorization:'Bearer '+tk, 'Content-Type':'application/json'}}));
      });
    }
    Promise.all(clearPromises).then(function() {
      // 3. Écrire les stocks initiaux (stockLines) dans Stock_Nourriture gerant + fondateur
      // IMPORTANT : écriture en batch (1 seul PUT par sheet) pour éviter la race condition
      // des appendRow parallèles (tous lisent row_count=0 et s'écrasent sur la même ligne).
      var stockInitPromises = [];
      if ((CYCLE.stockLines||[]).length > 0) {
        var _cycleDebutFr = isoToFr(CYCLE.dateDebut || todayISO());
        var _rationJourInit = Math.round((CYCLE.ration||12) * (CYCLE.nbBetes||4));
        var _totalKgInit = (CYCLE.stockLines||[]).reduce(function(s,x){return s+(parseFloat(x.kg)||0);},0);
        var _semInit = _rationJourInit > 0 ? (_totalKgInit/(_rationJourInit*7)).toFixed(1) : '0';
        var _allStockRows = (CYCLE.stockLines||[]).filter(function(sl){ return parseFloat(sl.kg)>0; }).map(function(sl) {
          var _kg = parseFloat(sl.kg)||0;
          return [_cycleDebutFr, sl.type, _kg, String(_rationJourInit), _semInit, parseFloat(_semInit)<6?'OUI':'NON'];
        });
        if (_allStockRows.length > 0) {
          var _stEnc = encodeURIComponent('Stock_Nourriture');
          var _stStart = 5; // TABLE_RANGES['Stock_Nourriture'].start
          [SID.gerant, SID.fondateur].filter(Boolean).forEach(function(sid) {
            stockInitPromises.push(
              getTok().then(function(tk) {
                if (!tk) return;
                var _url = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+_stEnc+'!A'+_stStart+'?valueInputOption=USER_ENTERED';
                return fetch(_url, {method:'PUT', headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json'}, body:JSON.stringify({values:_allStockRows})});
              })
            );
          });
        }
      }
      return Promise.all(stockInitPromises);
    }).then(function() {
      // 4. Sync Config_App et ATTENDRE la réponse avant loadLiveData
      // (sinon step1 relit les anciennes valeurs _last* et écrase le reset)
      return _syncConfigApp();
    }).then(function() {
      // 5. Rechargement complet depuis Sheets — Config_App est définitivement à jour
      loadLiveData();
    }).catch(function() {
      loadLiveData();
    });
  });
}

// Ouvre le mini-formulaire inline (action + confirmation)
function closeIncident(i) {
  var inc = LIVE.incidents[i];
  if (!inc) return;
  S._closeInc = { idx: i, act: inc.act || '' };
  r();
}

// Écrit la clôture dans Google Sheets (gérant + fondateur + rga) en trouvant la ligne exacte
function submitCloseInc() {
  var ci = S._closeInc;
  if (!ci) return;
  var inc = LIVE.incidents[ci.idx];
  if (!inc) return;
  var actNote = ci.act || '';
  var sidHisto = SID.gerant || SID.fondateur;
  if (!sidHisto) { S.msg = '❌ SID non configuré'; r(); return; }
  S.sending = true; r();
  getTok().then(function(tk) {
    if (!tk) { S.sending = false; S.msg = '❌ Token invalide'; r(); return; }
    readSheet(sidHisto, 'Incidents!A4:G200').then(function(rows) {
      var rowIdx = -1;
      (rows || []).forEach(function(row, i) {
        if (rowIdx >= 0) return;
        if (row[0] === inc.date && (row[1]||'') === inc.id && (row[2]||'') === inc.type) {
          rowIdx = 4 + i;
        }
      });
      if (rowIdx < 0) { S.sending = false; S.msg = '❌ Ligne introuvable dans Sheets'; r(); return; }
      var newRow = [inc.date, inc.id, inc.type, inc.grav, inc.desc, actNote, 'OUI'];
      var enc = encodeURIComponent('Incidents');
      var sids = [SID.gerant, SID.fondateur, SID.rga].filter(Boolean);
      var ps = sids.map(function(sid) {
        var url = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid
          +'/values/'+enc+'!A'+rowIdx+':G'+rowIdx+'?valueInputOption=USER_ENTERED';
        return fetch(url, { method:'PUT',
          headers:{ Authorization:'Bearer '+tk, 'Content-Type':'application/json' },
          body: JSON.stringify({ values:[newRow] }) });
      });
      return Promise.all(ps);
    }).then(function() {
      LIVE.incidents[ci.idx].act  = actNote;
      LIVE.incidents[ci.idx].clos = 'OUI';
      S.sending = false;
      S._closeInc = null;
      S.msg = '✅ Incident clôturé';
      r();
      setTimeout(function(){ S.msg=''; r(); }, 3000);
    }).catch(function(e) {
      S.sending = false;
      S.msg = '❌ ' + (e.message || 'Erreur réseau');
      r();
    });
  }).catch(function(e) {
    S.sending = false;
    S.msg = '❌ ' + (e.message || 'Erreur réseau');
    r();
  });
}

function animateCounters() {
  document.querySelectorAll('[data-count]').forEach(function(el) {
    var target = parseFloat(el.getAttribute('data-count'));
    var decimals = (target % 1 !== 0) ? 1 : 0;
    var duration = 900, start = null;
    function step(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / duration, 1);
      var ease = 1 - Math.pow(1 - p, 3);
      el.textContent = (target * ease).toFixed(decimals);
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = target.toFixed(decimals);
    }
    requestAnimationFrame(step);
  });
}

function viewMarche(){

    function courbesPrix(data) {
      if (!data.length) return '';
      var pts = data.slice(-10);
      var n = pts.length;
      var vals = pts.map(function(p){ return p.moy||p.bas||0; }).filter(function(v){ return v>0; });

    // ── Hero : prix actuel + tendance + foirail ──

      +'<button '+(S.sending?'disabled':'')+' onclick="doSubmit(\'marche\')">Enregistrer</button>'+msgHtml()
      +'</div>';
  } else if(S.sub==='sim'){
    var cycleMois = (S.simMois !== undefined && S.simMois !== null) ? S.simMois : (CYCLE.dureeMois || 8);

    var sp      = S.sp  !== null && S.sp  !== undefined ? S.sp  : (CYCLE.poidsDepart ? Math.round(CYCLE.poidsDepart*1.5) : 420); // poids vente ≈ 1.5× départ
    var _lastLiveMoy = LIVE.prix && LIVE.prix.length ? LIVE.prix[LIVE.prix.length-1].moy : 0;
    var px      = S.spx !== null && S.spx !== undefined ? S.spx : (_lastLiveMoy || CYCLE.objectifPrix || 2000);

    var cTotal  = cBase + cImprev;
    var ben     = ca - cTotal;
    var commVal = Math.round(ca * comm / 100);

    }

    // ── Cartes par bête ──
    var _betesCards = '';
    if (_recoBetes.length) {
      // Trier : urgence en premier (🟢 VENDRE > ⚠️ STAGNATION > 🟡 > 🔵 > 🔴 prix bas > ❓)
      var _ordre = {'🟢':0,'⚠️':1,'🟡':2,'🔵':3,'🔴':4,'❓':5};
      _recoBetes.sort(function(a,b){ return (_ordre[a.sig]||9)-(_ordre[b.sig]||9); });
      _betesCards = '<div style="font-size:11px;color:#556655;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Recommandations par bête</div>'
        + _recoBetes.map(function(b){
          return '<div style="background:'+b.sigBg+';border:1px solid '+b.sigCol+'44;border-radius:10px;padding:12px 14px;margin-bottom:10px">'
            +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
            +'<div style="font-size:15px;font-weight:800;color:#eee">'+b.sig+' '+b.id+'</div>'
            +'<div style="display:flex;gap:8px;font-size:10px;color:#88aa88">'
            +(b.nPesees>0?'<span>'+b.poids+' kg</span>':'<span style="color:#445544">— kg</span>')
            +'<span>GMQ '+b.gmq+' kg/j</span>'
            +'</div>'
            +'</div>'
            +'<div style="font-size:12px;color:#bbb;line-height:1.5">'+b.sigTxt+'</div>'
            +(b.rentable&&_lastPrix?'<div style="font-size:11px;font-weight:700;color:'+b.sigCol+';margin-top:6px">Bénéfice estimé : +'+fmt(Math.round((b.poids-b.poidsMin)*(_lastPrix||_objP)))+' FCFA si vendue maintenant</div>':'')
            +(b.nPesees===0?'<div style="font-size:10px;color:#445544;margin-top:4px">Aucune pesée — saisir pour obtenir une recommandation personnalisée</div>':'')
            +'</div>';
        }).join('');
    } else if (LIVE.loaded) {
      _betesCards = '<div style="font-size:12px;color:#445544;padding:8px 0">Aucune bête enregistrée — configurez le troupeau dans les paramètres du cycle.</div>';
    } else {
      _betesCards = '<div style="font-size:12px;color:#445544;padding:8px 0">⏳ Chargement des données des bêtes…</div>';
    }

    view='<div class="stitle">Recommandations — Commerciale</div>'
      +(_pdReco.length
        ? '<div style="font-size:11px;color:#445544;margin-bottom:10px">Données prix : <strong style="color:#88aa88">'+(_pdReco[_pdReco.length-1].date||'—')+'</strong> · '+_pdReco[_pdReco.length-1].foi+' · '+_pdReco.length+' observation(s)</div>'
        : '')
      +_globalSig
      +_globalAchat
      +_betesCards;
  }
  return '<div class="cnt"><div class="subtabs">'+stabs+'</div>'+view+'</div>';
}

// ══════════════════════════════════════════════════════════════
// GUIDE GÉRANT — Modal "Quoi faire et quand"
// ══════════════════════════════════════════════════════════════
function pageGuide() {
  if (!S._guideOpen) return '';

  var peseeFreq = CYCLE.peseeFreq || 30;

  // Carte de section avec badge de fréquence
  function section(bgGrad, accent, badgeBg, badgeTxt, emoji, titre, freq, taches) {
    var rows = taches.map(function(t, i) {
      return '<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;'
        +'border-bottom:1px solid rgba(255,255,255,0.05);'
        +(i===taches.length-1?'border-bottom:none':'')
        +'">'
        +'<div style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.08);'
        +'display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">'
        +t[0]+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:3px">'+t[1]+'</div>'
        +(t[2]?'<div style="font-size:12px;color:rgba(255,255,255,0.55);line-height:1.5">'+t[2]+'</div>':'')
        +(t[3]?'<button type="button" onclick="'+t[3]+';S._guideOpen=false;r()" '
          +'style="margin-top:9px;padding:7px 16px;background:'+accent+';color:#fff;border:none;'
          +'border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;width:auto;'
          +'letter-spacing:.03em;box-shadow:0 2px 8px rgba(0,0,0,0.3)">✏️ Saisir maintenant</button>':'')
        +'</div>'
        +'</div>';
    }).join('');

    return '<div style="background:'+bgGrad+';border:1px solid '+accent+'44;border-radius:16px;'
      +'padding:0;margin-bottom:14px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.25)">'
      // Header de section
      +'<div style="background:'+accent+'22;padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid '+accent+'33">'
      +'<div style="width:46px;height:46px;border-radius:14px;background:'+accent+'33;'
      +'display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">'
      +emoji+'</div>'
      +'<div style="flex:1">'
      +'<div style="font-size:15px;font-weight:800;color:#fff;letter-spacing:.01em">'+titre+'</div>'
      +'<div style="display:inline-block;margin-top:4px;padding:2px 10px;background:'+badgeBg+';'
      +'color:'+badgeTxt+';font-size:11px;font-weight:700;border-radius:20px;letter-spacing:.04em">'
      +freq+'</div>'
      +'</div>'
      +'</div>'
      // Taches
      +'<div style="padding:4px 16px 8px">'+rows+'</div>'
      +'</div>';
  }

  // ── État dynamique des tâches pour le guide ──
  var _guideFicheFait  = ficheDejaSoumise();
  var _guideSopFait    = sopDejaFait();
  var _guideBilanFait  = bilanDejaFaitCetteSemaine();
  var _guideJourSem    = new Date().getDay(); // 0=dim…5=ven…6=sam
  var _guideJoursVenBase = (_guideJourSem === 5) ? 0 : (5 - _guideJourSem + 7) % 7;
  // Reporter au vendredi suivant si cycle vient de démarrer (< 3 jours) et vendredi trop proche
  var _guideJoursVen = (function(){
    if (!_guideBilanFait && calcSemaine() === 1 && CYCLE.dateDebut) {
      var _age = Math.floor((Date.now()-new Date(CYCLE.dateDebut))/86400000);
      if (_age + _guideJoursVenBase < 3) return _guideJoursVenBase + 7;
    }
    return _guideJoursVenBase;
  })();

  var _tacheFiche = _guideFicheFait
    ? ['✅', 'Fiche du matin — ✓ Envoyée', 'Fiche du jour déjà enregistrée.', null]
    : ['🌅', 'Fiche du matin', 'Comptez les bêtes. Eau ? Nourriture ? Enclos OK ? Signalez tout problème.', 'chTab(\'saisie\');chSub(\'fiche\')'];

  var _tacheSop = _guideSopFait
    ? ['✅', 'Checklist du soir (SOP) — ✓ Fait', 'SOP déjà validé aujourd\'hui.', null]
    : ['🌙', 'Checklist du soir (SOP)', 'Nettoyage fait ? Rations distribuées ? Stock OK ? Santé des bêtes ?', 'chTab(\'saisie\');chSub(\'sop\')'];

  var _tacheBilan = _guideBilanFait
    ? ['✅', 'Bilan Sem. '+calcSemaine()+' — ✓ Envoyé', 'Bilan de la semaine bien reçu. Prochain bilan vendredi prochain.', null]
    : (_guideJoursVen === 0
      ? ['🔴', 'Bilan hebdomadaire — À envoyer ce soir !', 'C\'est vendredi ! Envoyez le bilan avant 20h : bêtes, nourriture, incidents, message direction.', 'chTab(\'saisie\');chSub(\'bilan\')']
      : ['📊', calcSemaine()===1 ? 'Bilan Sem. 1 — premier bilan du cycle' : 'Bilan hebdomadaire', 'Dans '+_guideJoursVen+' jour(s) (vendredi). Résumé : nombre de bêtes, nourriture, incidents, message à la Direction.', 'chTab(\'saisie\');chSub(\'bilan\')']);

  var body = '<div style="padding:14px 16px 24px;overflow-y:auto;max-height:calc(90vh - 70px)">'

    // Intro
    +'<div style="text-align:center;padding:8px 0 18px">'
    +'<div style="font-size:40px;margin-bottom:6px">🧑‍🌾</div>'
    +'<div style="font-size:13px;color:rgba(255,255,255,0.5);line-height:1.5">Suivez ce guide chaque jour.<br>L\'élevage dépend de votre rigueur.</div>'
    +'</div>'

    // CHAQUE JOUR
    +section(
      'linear-gradient(135deg,#0a2010,#0f2a15)',
      '#3a9a4a',
      '#1a4a20','#88ee99',
      '☀️','CHAQUE JOUR','Matin + Soir — SANS EXCEPTION',
      [
        _tacheFiche,
        _tacheSop,
        ['🤒','Bête malade → agir maintenant','Ne pas attendre. Saisir les symptômes et le traitement donné.','chTab(\'saisie\');chSub(\'sante\')'],
        ['🚨','Accident grave → appeler aussi','Saisir l\'incident ET appeler la Direction tout de suite.','chTab(\'saisie\');chSub(\'inc\')'],
      ]
    )

    // CHAQUE VENDREDI
    +section(
      'linear-gradient(135deg,#1a1500,#201c00)',
      '#C8A06A',
      '#3a2a00','#ffcc66',
      '📅','BILAN — VENDREDI SOIR','1 fois par semaine — avant 20h',
      [
        _tacheBilan,
      ]
    )

  var _guideLivraisonJ = joursSince('stock');
  var _tacheLivraison = _guideLivraisonJ < 999
    ? ['📦', 'Saisir le stock reçu', 'Dernière entrée stock il y a '+_guideLivraisonJ+' jour(s). Saisissez chaque nouvelle livraison dès réception.', 'chTab(\'saisie\');chSub(\'stock\')']
    : ['📦', 'Saisir le stock reçu', 'Aucune entrée stock enregistrée. Saisissez type d\'aliment + poids reçu à chaque livraison.', 'chTab(\'saisie\');chSub(\'stock\')'];

  var _guidePeseeJ = joursSince('pesee');
  var _guidePeseeOk = _guidePeseeJ <= peseeFreq;
  var _tachePesee = (_guidePeseeJ === 999)
    ? ['⚖️', 'Peser chaque bête', 'Aucune pesée enregistrée. Tous les '+peseeFreq+' jours : numéro de bête + race + poids.', 'chTab(\'saisie\');chSub(\'pesee\')']
    : _guidePeseeOk
      ? ['✅', 'Pesée à jour — prochaine dans '+Math.max(0, peseeFreq - _guidePeseeJ)+' jour(s)', 'Dernière pesée il y a '+_guidePeseeJ+' j. Prochain rappel dans '+Math.max(0, peseeFreq - _guidePeseeJ)+' jour(s).', null]
      : ['🔴', 'PESÉE EN RETARD — '+(_guidePeseeJ - peseeFreq)+' jours de retard !', 'Dernière pesée il y a '+_guidePeseeJ+' jours (fréquence : tous les '+peseeFreq+' j). À faire le plus tôt possible.', 'chTab(\'saisie\');chSub(\'pesee\')'];

    // QUAND LIVRAISON
    +section(
      'linear-gradient(135deg,#001525,#001f35)',
      '#3a88cc',
      '#003060','#66bbff',
      '🌾','LIVRAISON DE NOURRITURE','Chaque fois qu\'un sac ou camion arrive',
      [
        _tacheLivraison,
      ]
    )

    // PESÉE
    +section(
      'linear-gradient(135deg,#150020,#1a0028)',
      '#9a60cc',
      '#3a0060','#cc99ff',
      '⚖️','PESÉE DES BÊTES','Tous les '+peseeFreq+' jours — l\'app vous rappelle',
      [
        _tachePesee,
      ]
    )

    // BLOCK ALERTE ROUGE
    +'<div style="background:linear-gradient(135deg,#200808,#2a0a0a);border:1px solid #cc2222;'
    +'border-radius:16px;padding:16px;box-shadow:0 4px 16px rgba(200,0,0,0.2)">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
    +'<div style="font-size:28px">🔴</div>'
    +'<div style="font-size:15px;font-weight:800;color:#ff6666;letter-spacing:.02em">À RETENIR ABSOLUMENT</div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:10px">'
    +'<div style="display:flex;align-items:flex-start;gap:10px">'
    +'<div style="width:6px;height:6px;background:#ff4444;border-radius:50%;margin-top:6px;flex-shrink:0"></div>'
    +'<div style="font-size:13px;color:rgba(255,180,180,0.9);line-height:1.5">Bête morte → saisir dans <strong style="color:#ff9999">Santé</strong>, cocher "Décès = OUI"</div>'
    +'</div>'
    +'<div style="display:flex;align-items:flex-start;gap:10px">'
    +'<div style="width:6px;height:6px;background:#ff4444;border-radius:50%;margin-top:6px;flex-shrink:0"></div>'
    +'<div style="font-size:13px;color:rgba(255,180,180,0.9);line-height:1.5">Stock aliments &lt; 4 semaines → appeler la Direction <strong style="color:#ff9999">immédiatement</strong></div>'
    +'</div>'
    +'<div style="display:flex;align-items:flex-start;gap:10px">'
    +'<div style="width:6px;height:6px;background:#ff4444;border-radius:50%;margin-top:6px;flex-shrink:0"></div>'
    +'<div style="font-size:13px;color:rgba(255,180,180,0.9);line-height:1.5">En cas de doute → <strong style="color:#ff9999">appeler avant d\'agir</strong></div>'
    +'</div>'
    +'</div>'
    +'</div>'

    +'</div>';

  return '<div class="modal-overlay" onclick="if(event.target===this){S._guideOpen=false;r()}">'
    +'<div style="background:#0a1508;border:1px solid #2a4a2a;border-radius:20px 20px 0 0;'
    +'width:100%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;'
    +'animation:modalUp .3s cubic-bezier(.2,.8,.3,1);box-shadow:0 -8px 40px rgba(0,0,0,0.6)">'

    // Header
    +'<div style="padding:16px 20px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;'
    +'border-bottom:1px solid rgba(255,255,255,0.07)">'
    +'<div style="display:flex;align-items:center;gap:12px">'
    +'<div style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#2d6a2d,#3a9a4a);'
    +'display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 10px rgba(45,106,45,0.5)">📖</div>'
    +'<div>'
    +'<div style="font-size:16px;font-weight:800;color:#fff;letter-spacing:.01em">Mon guide de travail</div>'
    +'<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px">Gérant terrain · BOANR</div>'
    +'</div>'
    +'</div>'
    +'<button onclick="S._guideOpen=false;r()" '
    +'style="background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);'
    +'font-size:18px;cursor:pointer;line-height:1;padding:0;width:32px;height:32px;'
    +'border-radius:50%;display:flex;align-items:center;justify-content:center">✕</button>'
    +'</div>'

    +body
    +'</div>'
    +'</div>';
}

r();
setTimeout(initSwipe, 150);

</script>
</body>
</html>
