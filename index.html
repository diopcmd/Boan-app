<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1e4a1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BOANR">
<title>BOANR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1a0f;color:#fff;font-family:system-ui,-apple-system,sans-serif}
#app{min-height:100vh;display:flex;flex-direction:column}
.hdr{background:#1e4a1e;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-b{width:36px;height:36px;background:#2d6a2d;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:18px}
.tabs{background:#1a3a1a;display:flex;border-bottom:1px solid #2d4a2d;overflow-x:auto;scrollbar-width:none}
.tab{padding:12px 20px;font-size:14px;color:#88bb88;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
.tab.on{color:#fff;border-bottom-color:#fff}
.cnt{flex:1;padding:16px;max-width:600px;margin:0 auto;width:100%}
.stitle{font-size:11px;font-weight:500;color:#88bb88;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.kcard{background:#1a2e1a;border-radius:10px;padding:14px;border:1px solid #2a4a2a}
.card{background:#1a2e1a;border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid #2a4a2a}
.al{border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px}
.al-g{background:#1a2e1a;border:1px solid #2d6a2d;color:#88cc88}
.al-o{background:#2e2010;border:1px solid #8a5a00;color:#ffaa40}
.al-r{background:#2e1010;border:1px solid #8a0000;color:#ff7070}
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.stab{padding:6px 13px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid #2a4a2a;color:#88aa88;background:transparent}
.stab.on{background:#2d6a2d;color:#fff;border-color:#2d6a2d}
.fg{margin-bottom:13px}
.fl{font-size:13px;color:#aaa;margin-bottom:5px;display:block}
.fi{width:100%;background:#0f1a0f;border:1px solid #2a4a2a;color:#fff;padding:9px 12px;border-radius:8px;font-size:14px;outline:none;box-sizing:border-box}
.fi:focus{border-color:#4caf50}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rg{display:flex;gap:8px;flex-wrap:wrap}
.rb{padding:7px 14px;border-radius:8px;border:1px solid #2a4a2a;color:#88aa88;cursor:pointer;font-size:13px;background:transparent}
.rb.on{background:#2d6a2d;color:#fff;border-color:#2d6a2d}
.btn{width:100%;background:#2d6a2d;color:#fff;border:none;padding:13px;border-radius:8px;font-size:15px;cursor:pointer;font-weight:500;margin-top:4px}
.btn:disabled{background:#1a3a1a;color:#445544;cursor:not-allowed}
.msg-ok{background:#1a3a1a;border:1px solid #2d6a2d;color:#88cc88;padding:11px;border-radius:8px;margin-top:10px;font-size:13px;text-align:center}
.msg-err{background:#3a1a1a;border:1px solid #8a0000;color:#ff7070;padding:11px;border-radius:8px;margin-top:10px;font-size:13px;text-align:center}
.msg-load{background:#1a2e3a;border:1px solid #005a8a;color:#5ab4ff;padding:11px;border-radius:8px;margin-top:10px;font-size:13px;text-align:center}
.tw{overflow-x:auto;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a3a1a;color:#88bb88;padding:8px 10px;text-align:left;font-weight:500}
td{padding:8px 10px;border-bottom:1px solid #1a2e1a;color:#ccc}
.sep{height:1px;background:#1a2e1a;margin:14px 0}
.mkt{background:#1a2e1a;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #2a4a2a;display:flex;justify-content:space-between;align-items:center}
.dd{position:absolute;top:50px;right:12px;background:#1e3a1e;border:1px solid #2d6a2d;border-radius:10px;z-index:100;min-width:190px;overflow:hidden}
.ddi{padding:11px 16px;cursor:pointer;font-size:13px;border-bottom:1px solid #2a4a2a}
.ddi:hover,.ddi.on{background:#2d5a2d}
.spin{display:inline-block;width:12px;height:12px;border:2px solid #5ab4ff;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.lbg{min-height:100vh;background:#0f1a0f;display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:#1a2e1a;border-radius:16px;padding:30px 24px;width:100%;max-width:360px;border:1px solid #2a4a2a}
.logob{width:56px;height:56px;background:#2d6a2d;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:500}
.prog-bar{background:#2a4a2a;border-radius:4px;height:6px;flex:1;margin:0 10px}
.prog-fill{background:#4caf50;border-radius:4px;height:6px}
.badge{background:#1a3a5a;color:#5ab4ff;font-size:11px;padding:3px 10px;border-radius:12px}
.ubtn{background:#2d5a2d;border:none;color:#fff;padding:7px 12px;border-radius:20px;cursor:pointer;font-size:13px}
.sim-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a2a1a;font-size:13px}
.sim-row:last-child{border-bottom:none}
.reco-card{background:#1a2e1a;border-radius:10px;padding:13px;margin-bottom:10px;border:1px solid #2a4a2a}
.act{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #1a2e1a}
.dot{width:8px;height:8px;border-radius:50%;background:#4caf50;margin-top:5px;flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
const USERS={
  fondateur:{name:'Fondateur',pwd:'boanr2026',tabs:['dashboard','saisie','livrables','marche']},
  gerant:{name:'Gerant terrain',pwd:'terrain2026',tabs:['dashboard','saisie']},
  rga:{name:'RGA',pwd:'admin2026',tabs:['dashboard','livrables']},
  fallou:{name:'Fallou',pwd:'marche2026',tabs:['dashboard','marche']}
};
const SID={
  fondateur:'1QgixxPoBANi4tbfRuU-VPMiDHRUt-5u3JPKqmrVYu-E',
  gerant:'1NC_xZIcncV-YZXT17cU1s8hzZ5_bQGC4HATg4qyiGG0',
  rga:'17iIwFYlZi2mXRhIrw6UFceb6cxqL6XXS7vpPwA2HPyY',
  fallou:'17_P6yexo5fHWip_rlw6Iv3i80mWO-1TaAa3-cmVRj1o'
};
const MOCK={betes:4,gmq:1.1,stock:6,treso:680000,sem:4,mois:1};
let S={page:'cfg',user:null,tab:'dashboard',sub:'fiche',dd:false,sa:null,jin:'',jerr:'',lid:'',lpw:'',lerr:'',sending:false,msg:'',tok:null,tokexp:0,fi:{date:'',nb:'',nourris:'OUI',eau:'OUI',enclos:'OUI',incident:'NON',desc:''},fs:{date:'',net:'OUI',des:'OUI',rat:'OUI',eau:'OUI',stk:'OUI',san:'OUI',prob:''},fst:{date:'',type:'',kg:'',rat:''},fin:{date:'',id:'',type:'',grav:'1',desc:'',act:'',clos:'NON'},fp:{date:'',id:'',race:'Djakoré',poids:'',prev:''},fsa:{date:'',id:'',sym:'',tra:'',cout:'',res:'Gueri',dec:'NON'},fb:{sem:'',nb:'',nou:'OUI',stk:'',inc:'NON',poi:'OUI',msg:''},fm:{date:'',foi:'Thies',bas:'',moy:'',haut:''},sn:4,sp:466,spx:2000};
const fmt=n=>new Intl.NumberFormat('fr-FR').format(Math.round(n));
const today=()=>new Date().toLocaleDateString('fr-FR');
const gc=(t,v)=>{if(t==='gmq')return v>=1?'#4caf50':v>=0.8?'#ff9800':'#f44336';if(t==='stk')return v>=6?'#4caf50':v>=4?'#ff9800':'#f44336';if(t==='tr')return v>=600000?'#4caf50':v>=400000?'#ff9800':'#f44336';return'#4caf50';};
function r(){const el=document.getElementById('app');if(!el)return;if(S.page==='cfg'){el.innerHTML=pageCfg();return;}if(S.page==='login'){el.innerHTML=pageLogin();return;}el.innerHTML=pageApp();}
function b64u(s,bin=false){const b=bin?btoa(s):btoa(unescape(encodeURIComponent(s)));return b.replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
async function getTok(){if(S.tok&&Date.now()<S.tokexp-60000)return S.tok;if(!S.sa)return null;try{const sa=S.sa,now=Math.floor(Date.now()/1000);const h=b64u(JSON.stringify({alg:'RS256',typ:'JWT'}));const p=b64u(JSON.stringify({iss:sa.client_email,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now}));const si=h+'.'+p;const kd=sa.private_key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');const kb=Uint8Array.from(atob(kd),c=>c.charCodeAt(0));const ck=await crypto.subtle.importKey('pkcs8',kb.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',ck,new TextEncoder().encode(si));const sb=b64u(String.fromCharCode(...new Uint8Array(sig)),true);const jwt=si+'.'+sb;const res=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});const d=await res.json();if(d.access_token){S.tok=d.access_token;S.tokexp=Date.now()+3600000;}return S.tok;}catch(e){return null;}}
async function appendRow(sid,range,vals){const tk=await getTok();if(!tk)return{ok:false,err:'Token invalide'};try{const url=`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;const res=await fetch(url,{method:'POST',headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json'},body:JSON.stringify({values:[vals]})});const d=await res.json();if(d.error)return{ok:false,err:d.error.message};return{ok:true};}catch(e){return{ok:false,err:e.message};}}
async function doSubmit(type){S.sending=true;S.msg='load';r();let res;const td=today();if(type==='fiche'){const f=S.fi;res=await appendRow(SID.gerant,'Fiche_Quotidienne!A:G',[f.date||td,f.nb,f.nourris,f.eau,f.enclos,f.incident,f.desc]);if(res.ok)await appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'','','','','','','',f.incident==='OUI'?1:0,'','']);}else if(type==='sop'){const f=S.fs;res=await appendRow(SID.gerant,'SOP_Check!A:H',[f.date||td,f.net,f.des,f.rat,f.eau,f.stk,f.san,f.prob]);}else if(type==='stock'){const f=S.fst;const sem=f.rat>0?(parseFloat(f.kg)/(parseFloat(f.rat)*7)).toFixed(1):0;res=await appendRow(SID.gerant,'Stock_Nourriture!A:F',[f.date||td,f.type,f.kg,f.rat,sem,parseFloat(sem)<6?'OUI':'NON']);if(res.ok)await appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'','',f.kg,'','','','','','','']);}else if(type==='inc'){const f=S.fin;res=await appendRow(SID.gerant,'Incidents!A:G',[f.date||td,f.id,f.type,f.grav,f.desc,f.act,f.clos]);if(res.ok&&parseInt(f.grav)>=2)await appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'','','','','','','',1,'',`Incident G${f.grav}`]);}else if(type==='pesee'){const f=S.fp;const gain=f.poids&&f.prev?(parseFloat(f.poids)-parseFloat(f.prev)).toFixed(1):'';res=await appendRow(SID.gerant,'Pesees!A:G',[f.date||td,f.id,f.race,f.poids,f.prev,gain,gain&&parseFloat(gain)<0?'ALERTE':'OK']);if(res.ok)await appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'','','','','',f.poids,'','','','']);}else if(type==='sante'){const f=S.fsa;res=await appendRow(SID.gerant,'Sante_Mortalite!A:G',[f.date||td,f.id,f.sym,f.tra,f.cout,f.res,f.dec]);if(res.ok&&f.dec==='OUI')await appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'DECES','','','','','','',1,'','APPELER FONDATEUR']);}else if(type==='bilan'){const f=S.fb;const al=f.inc==='OUI'||parseFloat(f.stk)<6?'APPELER CHEIKH':'SEMAINE OK';res=await appendRow(SID.gerant,'Hebdomadaire!A:H',[`Semaine ${f.sem}`,f.nb,f.nou,f.stk,f.inc,f.poi,al,f.msg]);if(res.ok)await appendRow(SID.fondateur,'KPI_Hebdo!A:J',[`S${f.sem}`,f.nb,f.stk,'','',f.inc,'',f.nou,'',al]);}else if(type==='marche'){const f=S.fm;res=await appendRow(SID.fallou,'Suivi_Marche!A:J',[f.date||td,f.foi,f.bas,f.moy,f.haut,'','','-','','']);}S.sending=false;S.msg=res?.ok?'ok':'err:'+(res?.err||'Erreur');r();setTimeout(()=>{S.msg='';r();},4000);}
function loadSA(){try{const sa=JSON.parse(S.jin.trim());if(!sa.client_email||!sa.private_key){S.jerr='JSON invalide';r();return;}S.sa=sa;S.jerr='';S.page='login';r();}catch{S.jerr='JSON invalide — verifie le format';r();}}
function doLogin(){const id=S.lid.trim().toLowerCase();if(USERS[id]&&USERS[id].pwd===S.lpw){S.user=id;S.lerr='';S.page='app';S.tab=USERS[id].tabs[0];S.sub=S.tab==='saisie'?'fiche':S.tab==='livrables'?'treso':S.tab==='marche'?'prix':'';r();}else{S.lerr='Identifiant ou mot de passe incorrect';r();}}
function chTab(t){S.tab=t;S.msg='';S.dd=false;S.sub=t==='saisie'?'fiche':t==='livrables'?'treso':t==='marche'?'prix':'';r();}
function chSub(s){S.sub=s;S.msg='';r();}
function swUser(k){S.user=k;S.dd=false;chTab(USERS[k].tabs[0]);}
function yn(val,k,obj){return `<div class="rg"><div class="rb ${val==='OUI'?'on':''}" onclick="S.${obj}.${k}='OUI';r()">OUI</div><div class="rb ${val==='NON'?'on':''}" onclick="S.${obj}.${k}='NON';r()">NON</div></div>`;}
function msgHtml(){if(!S.msg)return'';if(S.msg==='load')return`<div class="msg-load"><span class="spin"></span>Envoi vers Google Sheets...</div>`;if(S.msg==='ok')return`<div class="msg-ok">Enregistre dans Google Sheets !</div>`;return`<div class="msg-err">Erreur : ${S.msg.replace('err:','')}</div>`;}
function pageCfg(){return `<div class="lbg"><div class="lcard"><div style="text-align:center;margin-bottom:20px"><div class="logob">B</div><div style="font-size:20px;font-weight:500;margin-top:8px">BOANR</div><div style="font-size:13px;color:#88aa88;margin-top:4px">Colle ton fichier JSON service account</div></div><div class="fg"><textarea class="fi" rows="7" style="font-size:12px;font-family:monospace;resize:vertical" placeholder='{"type":"service_account",...}' oninput="S.jin=this.value">${S.jin}</textarea></div>${S.jerr?`<div class="msg-err">${S.jerr}</div>`:''}<button class="btn" onclick="loadSA()">Connecter</button><div style="margin-top:12px;font-size:11px;color:#445544;text-align:center">Cle stockee uniquement en memoire</div></div></div>`;}
function pageLogin(){return `<div class="lbg"><div class="lcard"><div style="text-align:center;margin-bottom:22px"><div class="logob">B</div><div style="font-size:22px;font-weight:500;margin-top:8px">BOANR</div><div style="font-size:13px;color:#88aa88;margin-top:4px">Gestion elevage bovin</div></div><div class="fg"><label class="fl">Identifiant</label><input class="fi" placeholder="ex: gerant" value="${S.lid}" oninput="S.lid=this.value" onkeydown="if(event.key==='Enter')doLogin()"></div><div class="fg"><label class="fl">Mot de passe</label><input class="fi" type="password" value="${S.lpw}" oninput="S.lpw=this.value" onkeydown="if(event.key==='Enter')doLogin()"></div>${S.lerr?`<div class="msg-err">${S.lerr}</div>`:''}<button class="btn" style="margin-top:6px" onclick="doLogin()">Se connecter</button><div style="margin-top:14px;font-size:11px;color:#445544;text-align:center">fondateur · gerant · rga · fallou</div></div></div>`;}
function pageApp(){const tnames={dashboard:'Dashboard',saisie:'Saisie',livrables:'Livrables',marche:'Marche'};const utabs=USERS[S.user].tabs;return `<div id="app" onclick="if(S.dd&&!event.target.closest('.ubtn')&&!event.target.closest('.dd')){S.dd=false;r()}"><div class="hdr"><div class="logo"><div class="logo-b">B</div><div><div style="font-size:18px;font-weight:500">BOANR</div><div style="font-size:11px;color:#88bb88">Cycle 1 — Sem. ${MOCK.sem}</div></div></div><div style="position:relative"><button class="ubtn" onclick="S.dd=!S.dd;r()">${USERS[S.user].name} ▾</button>${S.dd?`<div class="dd">${Object.entries(USERS).map(([k,v])=>`<div class="ddi ${S.user===k?'on':''}" onclick="swUser('${k}')">${v.name}<br><span style="font-size:11px;color:#88bb88">${v.tabs.join(' · ')}</span></div>`).join('')}<div class="ddi" style="color:#ff7070" onclick="S.page='login';S.user=null;S.dd=false;r()">Deconnexion</div></div>`:''}</div></div><div class="tabs">${utabs.map(t=>`<div class="tab ${S.tab===t?'on':''}" onclick="chTab('${t}')">${tnames[t]}</div>`).join('')}</div>${S.tab==='dashboard'?viewDash():S.tab==='saisie'?viewSaisie():S.tab==='livrables'?viewLiv():viewMarche()}</div>`;}
function viewDash(){const pct=Math.round((MOCK.sem/35)*100);return `<div class="cnt"><div class="stitle">Indicateurs Cycle</div><div class="kgrid"><div class="kcard"><div style="font-size:12px;color:#88bb88;margin-bottom:4px">Betes actives</div><div style="font-size:26px;font-weight:500;color:#4caf50">${MOCK.betes}</div><div style="font-size:11px;color:#4caf50;margin-top:4px">0% mortalite</div></div><div class="kcard"><div style="font-size:12px;color:#88bb88;margin-bottom:4px">GMQ moyen</div><div style="font-size:26px;font-weight:500;color:${gc('gmq',MOCK.gmq)}">${MOCK.gmq} kg/j</div><div style="font-size:11px;color:${gc('gmq',MOCK.gmq)};margin-top:4px">Cible >= 1.0</div></div><div class="kcard"><div style="font-size:12px;color:#88bb88;margin-bottom:4px">Stock aliments</div><div style="font-size:26px;font-weight:500;color:${gc('stk',MOCK.stock)}">${MOCK.stock} sem.</div><div style="font-size:11px;color:${gc('stk',MOCK.stock)};margin-top:4px">Suffisant</div></div><div class="kcard"><div style="font-size:12px;color:#88bb88;margin-bottom:4px">Tresorerie</div><div style="font-size:26px;font-weight:500;color:${gc('tr',MOCK.treso)}">${Math.round(MOCK.treso/1000)}k</div><div style="font-size:11px;color:${gc('tr',MOCK.treso)};margin-top:4px">Min. 600k</div></div></div><div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;color:#aaa">Avancement</span><span class="badge">Mois ${MOCK.mois}/8</span></div><div style="display:flex;align-items:center"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span style="font-size:12px;color:#88aa88">${pct}%</span></div><div style="margin-top:6px;font-size:11px;color:#445544">Semaine ${MOCK.sem} / 35</div></div><div class="stitle">Alertes</div><div class="al al-g">Mortalite 0% — objectif respecte</div><div class="al al-g">GMQ 1.1 kg/j — au-dessus de la cible</div><div class="al al-g">Stock aliments 6 sem. — suffisant</div><div class="al al-o">Tresorerie 680k — surveiller (min 600k)</div><div class="sep"></div><div class="stitle">Activite recente</div>${[["Fiche quotidienne — 4 betes nourries","Aujourd'hui 07:30"],["Pesee C1-001 : 290 kg","Hier 16:00"],["Checklist SOP validee","Hier 07:15"],["Stock verifie — 6 semaines","Il y a 3j"]].map(([t,d])=>`<div class="act"><div class="dot"></div><div><div style="font-size:13px;color:#ccc">${t}</div><div style="font-size:11px;color:#555;margin-top:2px">${d}</div></div></div>`).join('')}</div>`;}

function viewMarche(){const subs=[['prix','Prix'],['sim','Simulateur'],['reco','Recos']];let view='';const fm=S.fm;if(S.sub==='prix')view=`<div class="stitle">Prix observes</div>${[['10/03','Thies',2000,'up'],['27/02','Tivaouane',2050,'up'],['14/02','Diourbel',1950,'down']].map(([d,fo,m,t])=>`<div class="mkt"><div><div style="font-size:17px;font-weight:500">${m.toLocaleString()} FCFA/kg</div><div style="font-size:11px;color:#88aa88">${fo} — ${d}</div></div><div style="color:${t==='up'?'#4caf50':'#f44336'};font-size:16px">${t==='up'?'↑':'↓'}</div></div>`).join('')}<div class="sep"></div><div class="card"><div class="frow"><div class="fg"><label class="fl">Date</label><input type="date" class="fi" value="${fm.date}" oninput="S.fm.date=this.value"></div><div class="fg"><label class="fl">Foirail</label><select class="fi" oninput="S.fm.foi=this.value"><option>Thies</option><option>Tivaouane</option><option>Diourbel</option><option>Autre</option></select></div></div><div class="frow"><div class="fg"><label class="fl">Prix bas</label><input type="number" class="fi" oninput="S.fm.bas=this.value"></div><div class="fg"><label class="fl">Prix moyen</label><input type="number" class="fi" oninput="S.fm.moy=this.value"></div></div><div class="fg"><label class="fl">Prix haut</label><input type="number" class="fi" oninput="S.fm.haut=this.value"></div><button class="btn" ${S.sending?'disabled':''} onclick="doSubmit('marche')">Enregistrer</button>${msgHtml()}</div>`;else if(S.sub==='sim'){const nb=S.sn,p=S.sp,px=S.spx,ca=nb*p*px,cout=nb*639000,ben=ca-cout,marge=Math.round((ben/ca)*100);const[dec,bg,bc,tc]=px<1600?['STOP ACHAT','#2e1010','#8a0000','#f44336']:px<1900?["VENTE D'URGENCE",'#2e1010','#8a0000','#f44336']:px<2000?['ACCEPTABLE','#2e2010','#8a5a00','#ffa040']:px<2200?['CIBLE ATTEINTE','#1a3a1a','#2d6a2d','#4caf50']:['EXCELLENT','#1a3a1a','#2d6a2d','#4caf50'];view=`<div class="card"><div class="fg"><label class="fl">Nb betes : <strong>${nb}</strong></label><input type="range" m v class="subtabs">${subs.map(([k,l])=>`<div class="stab ${S.sub===k?'on':''}" onclick="chSub('${k}')">${l}</div>`).join('')}</div>${view}</div>`;}
