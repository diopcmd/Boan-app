body.light .kval-warn{color:#b86a00}

.fl{position:relative;margin-bottom:13px}
.fl input,.fl select,.fl textarea{padding:18px 12px 6px;font-size:15px}
.fl label{position:absolute;left:12px;top:12px;font-size:14px;color:#88aa88;pointer-events:none;transition:all .18s ease;transform-origin:left top}
.fl input:focus~label,.fl input:not(:placeholder-shown)~label,
.fl select:focus~label,.fl textarea:focus~label,.fl textarea:not(:placeholder-shown)~label,
.fl.has-val label{top:4px;font-size:10px;color:#C8A06A;letter-spacing:.04em;transform:scale(0.9)}

body.light .fl input:focus~label,body.light .fl.has-val label{color:#2d6a2d}

.ai-pulse{animation:spin 1.2s linear infinite;display:inline-block}

// Date helpers
// ── Source de vérité : fuseau Africa/Dakar (UTC+0 toute l'année)
// Le gérant est à Dakar — toutes les dates/heures sont en heure de Dakar
function _nowDakar() {
  // Dakar est UTC+0 toute l’année — fallback direct si Intl ne supporte pas Africa/Dakar
  try {
    var fmt = new Intl.DateTimeFormat('fr-FR', {
      timeZone: 'Africa/Dakar',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    });
    var parts = fmt.formatToParts(new Date());
    var get = function(t){ return parts.find(function(p){return p.type===t;}).value; };
    return {
      year:  parseInt(get('year')),
      month: parseInt(get('month')),
      day:   parseInt(get('day')),
      hour:  parseInt(get('hour')),
      minute:parseInt(get('minute')),
      weekday: (function(){
        var d = new Date(parseInt(get('year')), parseInt(get('month'))-1, parseInt(get('day')));
        return d.getDay();
      })()
    };
  } catch(e) {
    // Fallback UTC+0 (= Dakar, pas de décalage)
    var _d = new Date();
    return {
      year: _d.getUTCFullYear(), month: _d.getUTCMonth()+1, day: _d.getUTCDate(),
      hour: _d.getUTCHours(), minute: _d.getUTCMinutes(),
      weekday: _d.getUTCDay()
    };
  }
}
function today() {
  var n = _nowDakar();
  return (n.day<10?'0':'')+n.day+'/'+(n.month<10?'0':'')+n.month+'/'+n.year;
}
function todayISO() {
  var n = _nowDakar();
  return n.year+'-'+(n.month<10?'0':'')+n.month+'-'+(n.day<10?'0':'')+n.day;
}
function nowHeure() { return _nowDakar().hour; }   // remplace nowHeure()

// Calcul semaine depuis date début
function calcSemaine() {
  if (!CYCLE.dateDebut) return MOCK.sem;
  var debut = new Date(CYCLE.dateDebut);
  var _nd3  = _nowDakar();
  var now   = new Date(_nd3.year, _nd3.month-1, _nd3.day);
  var diff  = Math.floor((now - debut) / (7 * 24 * 3600 * 1000)) + 1;
  return Math.max(1, Math.min(diff, Math.round((CYCLE.dureeMois||8)*4.33)));
}

// ── Calcul stock local depuis STOCK_MVTS (fallback si Sheets pas chargé) ──
function calcStockLocal() {
  // Calcule le stock net par aliment depuis STOCK_MVTS persisté
  var netKg = {};
  (STOCK_MVTS||[]).forEach(function(m) {
    var kg = parseFloat(m.kg) || 0;
    netKg[m.type] = (netKg[m.type]||0) + (m.mode==='ajouter' ? kg : -kg);
  });
  // Somme des stocks positifs par aliment (un aliment épuisé ne donne pas de stock négatif)
  var totalNet = Object.keys(netKg).reduce(function(s,t){
    return s + Math.max(0, netKg[t]);
  }, 0);
  var rationJour = (CYCLE.ration||12) * (CYCLE.nbBetes||4);
  if(rationJour <= 0) return 0;
  // Fallback sur CYCLE.stockLines si STOCK_MVTS est vide (ex: juste après reset cycle ou avant Vague 1)
  // Garantit que la ration configurée par le fondateur est utilisée dès step1.
  if (totalNet === 0 && (CYCLE.stockLines||[]).length > 0) {
    totalNet = (CYCLE.stockLines||[]).reduce(function(s,x){ return s+(parseFloat(x.kg)||0); }, 0);
  }
  return Math.round((totalNet / (rationJour * 7)) * 10) / 10;
}
// Retourne le détail stock net par aliment {type: kgNet}
function calcStockParAliment() {
  var netKg = {};
  (STOCK_MVTS||[]).forEach(function(m) {
    var kg = parseFloat(m.kg) || 0;
    netKg[m.type] = (netKg[m.type]||0) + (m.mode==='ajouter' ? kg : -kg);
  });
  return netKg;
}
// ── Résumé synthèse stock (pour dashboard/sidebar/PDF) ──
function stockSyntheseHtml(compact) {
  var ajouts = {}, consos = {};
  (STOCK_MVTS||[]).forEach(function(m) {
    var kg = parseFloat(m.kg)||0;
    if(m.mode==='consommer') consos[m.type]=(consos[m.type]||0)+kg;
    else ajouts[m.type]=(ajouts[m.type]||0)+kg;
  });
  var types = Object.keys(Object.assign({}, ajouts, consos)).sort();
  if(!types.length) return '<div style="color:#88aa88;font-size:12px;padding:8px 0;text-align:center">Aucun mouvement enregistré ce cycle</div>';
  if(compact) {
    // Mode compact sidebar : aliment + stock courant
    var _cLt = document.body.classList.contains('light');
    return types.map(function(t){
      var a=ajouts[t]||0, c=consos[t]||0, net=Math.max(0,a-c);
      return '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px solid '+(_cLt?'#c5d8c5':'#1a2e1a')+'">'
        +'<span style="color:'+(_cLt?'#334433':'#ccc')+';flex:1">'+t+'</span>'
        +'<span style="color:'+(net>0?'#4caf50':'#f44336')+';font-weight:700;margin-left:8px">'+net+' kg</span>'
        +'</div>';
    }).join('');
  }
  // Mode complet : ajout / conso / net
  var totalA=0, totalC=0;
  var rows = types.map(function(t){
    var a=ajouts[t]||0, c=consos[t]||0, net=a-c;
    totalA+=a; totalC+=c;
    return '<tr style="border-bottom:1px solid #1a2e1a">'
      +'<td style="padding:6px 8px;font-size:13px;color:#ccc">'+t+'</td>'
      +'<td style="padding:6px 8px;text-align:right;color:#4caf50;font-weight:600">+'+(a||0)+' kg</td>'
      +'<td style="padding:6px 8px;text-align:right;color:#f44336;font-weight:600">-'+(c||0)+' kg</td>'
      +'<td style="padding:6px 8px;text-align:right;color:'+(net>=0?'#C8A06A':'#f44336')+';font-weight:700">'+(net>=0?'+':'')+net+' kg</td>'
      +'</tr>';
  }).join('');
  var totalNet = totalA-totalC;
  var totalRow = '<tr style="background:#0a150a">'
    +'<td style="padding:6px 8px;font-size:12px;font-weight:700;color:#C8A06A">TOTAL</td>'
    +'<td style="padding:6px 8px;text-align:right;color:#4caf50;font-weight:700">+'+totalA+' kg</td>'
    +'<td style="padding:6px 8px;text-align:right;color:#f44336;font-weight:700">-'+totalC+' kg</td>'
    +'<td style="padding:6px 8px;text-align:right;color:'+(totalNet>=0?'#C8A06A':'#f44336')+';font-weight:700">'+(totalNet>=0?'+':'')+totalNet+' kg</td>'
    +'</tr>';
  return '<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="background:#0f200f">'
    +'<th style="padding:6px 8px;text-align:left;font-size:11px;color:#88aa88;font-weight:600">Aliment</th>'
    +'<th style="padding:6px 8px;text-align:right;font-size:11px;color:#4caf50;font-weight:600">Ajouté</th>'
    +'<th style="padding:6px 8px;text-align:right;font-size:11px;color:#f44336;font-weight:600">Consommé</th>'
    +'<th style="padding:6px 8px;text-align:right;font-size:11px;color:#C8A06A;font-weight:600">Net</th>'
    +'</tr></thead>'
    +'<tbody>'+rows+totalRow+'</tbody></table>';
}

// Anti-doublon fiche du jour
// Retourne le numéro de semaine ISO d'une date
function semaineISO(date) {
  var d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  var yearStart = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}
function semaineDeDate(ddmmyyyy) {
  if (!ddmmyyyy) return -1;
  var p = ddmmyyyy.split('/');
  if (p.length !== 3) return -1;
  return semaineISO(new Date(p[2], p[1]-1, p[0]));
}

// Vérifie si une bête a déjà été pesée cette semaine calendaire
function peseeDejaFaite(id) {
  var n = _nowDakar();
  var semCour = semaineISO(new Date(n.year, n.month-1, n.day));
  return LIVE.pesees.some(function(p){
    return p.id === id && semaineDeDate(p.date) === semCour;
  });
}

// Jours écoulés depuis la dernière saisie d'un type donné (depuis HISTORY)
function joursSince(type) {
  var h = HISTORY.filter(function(x){ return x.type === type; });
  var lastDate = null;
  if (h.length) {
    lastDate = h[0].date; // HISTORY trié desc — premièr = le plus récent
  } else {
    // Fallback Config_App — disponible dès step1, avant Vague 2
    var _fb = {
      sop:   CYCLE._lastSopDate,
      stock: CYCLE._lastStockDate,
      pesee: CYCLE._lastPeseeDate,
      inc:   CYCLE._lastIncDate,
      sante: CYCLE._lastSanteDate
    };
    lastDate = _fb[type] || null;
  }
  if (!lastDate) return 999;
  var p = lastDate.split('/');
  if (p.length !== 3) return 999;
  var _nd2 = _nowDakar();
  return Math.round((new Date(_nd2.year, _nd2.month-1, _nd2.day) - new Date(p[2], p[1]-1, p[0])) / 86400000);
}

function saveToQueue(type, vals) {
  OFFLINE_QUEUE.push({type:type, vals:vals, ts:Date.now()});
  if (OFFLINE_QUEUE.length > 30) OFFLINE_QUEUE = OFFLINE_QUEUE.slice(-30);

function flushQueue() {
  if (!ONLINE || !OFFLINE_QUEUE.length) return;
  var item = OFFLINE_QUEUE.shift();
  lsSet('offline_queue', OFFLINE_QUEUE);
  if (item && item.range && item.vals) {
    appendRow(SID.gerant, item.range, item.vals).then(function(res){
      if (res && res.ok) { setTimeout(flushQueue, 300); }
      else { OFFLINE_QUEUE.unshift(item); lsSet('offline_queue', OFFLINE_QUEUE); }
    });
  }
}

// ── MÉTÉO (Open-Meteo, Thiès Sénégal ~14.79°N, -16.93°E) ──
var METEO = { temp:null, rain:null, wind:null, code:null, loaded:false, error:false, week:[], showWeek:false };
function fetchMeteo() {
  if (METEO.loaded) return;
  METEO.error = false;
  // Récupère météo actuelle + prévisions 7 jours en une seule requête
  fetch('https://api.open-meteo.com/v1/forecast?latitude=14.79&longitude=-16.93&current=temperature_2m,precipitation,windspeed_10m,weathercode&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=Africa%2FDakar&forecast_days=7')
  .then(function(res){ return res.json(); })
  .then(function(d){
    if (!d.current) throw new Error('Pas de données');
    var c = d.current;
    METEO.temp = Math.round(c.temperature_2m);
    METEO.rain = c.precipitation;
    METEO.wind = Math.round(c.windspeed_10m);
    METEO.code = c.weathercode;
    // Prévisions 7 jours
    if (d.daily) {
      METEO.week = d.daily.time.map(function(date, i) {
        return {
          date: date,
          tmax: Math.round(d.daily.temperature_2m_max[i]),
          tmin: Math.round(d.daily.temperature_2m_min[i]),
          rain: Math.round(d.daily.precipitation_sum[i] * 10) / 10,
          code: d.daily.weathercode[i]
        };
      });
    }
    METEO.loaded = true;
    METEO.error = false;
    r();
  }).catch(function(e){
    METEO.loaded = true;
    METEO.error = true;
    r();
  });
}

function r() {
  var el = document.getElementById('app');
  if (!el) return;
  // Sauvegarder focus avant re-render (évite disparition clavier mobile)
  var _ae = document.activeElement;
  var _aid = _ae && _ae.id ? _ae.id : null;
  var _atag = _ae ? _ae.tagName : '';
  var _asel0 = null, _asel1 = null;
  if (_aid && _ae.selectionStart !== undefined) {
    try { _asel0 = _ae.selectionStart; _asel1 = _ae.selectionEnd; } catch(e) {}
  }
  // Verrou scroll : bloque le défilement du fond quand un overlay est actif (iOS/Android)
  var _ov = SB.open || MODAL.open || CONFIRM.open ||
    S._resetPwdOpen || S._aiOpen || S._pwdMgrOpen || S._guideOpen;
  document.body.style.overflow = _ov ? 'hidden' : '';
  var html;
  if (S.page==='login') {
    try {
      html = pageLogin();
      if (MODAL.open) html += pageModal();
    } catch(e) {
      html = '<div style="padding:20px;color:#ff7070;text-align:center;margin-top:60px">Erreur: '+(e&&e.message||e)+'</div>';
    }
  } else {
    try {
      html = pageApp();
      if (MODAL.open) html += pageModal();
      if (CONFIRM.open) html += pageConfirm();
      if (S._resetPwdOpen) html += pageResetPwd();
      if (S._aiOpen) html += pageAI();
      if (S._pwdMgrOpen) html += pagePwdManager();
      if (S._guideOpen)   html += pageGuide();
    } catch(e) {
      html = '<div style="padding:24px;max-width:400px;margin:40px auto;background:#2e1010;border:1px solid #8a0000;border-radius:12px;color:#ff7070;font-family:monospace">'
        +'<div style="font-size:15px;font-weight:700;margin-bottom:8px">⚠️ Erreur</div>'
        +'<div style="font-size:12px;word-break:break-all">'+(e&&e.message||String(e))+'</div>'
        +'<button onclick="S.page=\'login\';S.user=null;r()" style="margin-top:14px;background:#8a0000">Retour connexion</button>'
        +'</div>';
    }
  }
  el.innerHTML = html;
  // Restaurer focus sur les inputs avec ID (maintient le clavier mobile ouvert)
  if (_aid && (_atag === 'INPUT' || _atag === 'TEXTAREA')) {
    var _re = document.getElementById(_aid);
    if (_re) {
      _re.focus({preventScroll: true});
      if (_asel0 !== null && _re.setSelectionRange) {
        try { _re.setSelectionRange(_asel0, _asel1); } catch(e) {}
      }
    }
  }
}

function doLogin() {
  var id = S.lid.trim().toLowerCase();
  var pw = S.lpw;
  if (!id || !pw) { S.lerr = 'Identifiants requis'; r(); return; }
  // Pas de vérification locale USERS[id] — le serveur gère les logins overridés

  S.sending = true; S.lerr = ''; r();

  fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ login: id, password: pw })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    S.sending = false;
    if (!data.ok) {
      S.lerr = data.error || 'Identifiants incorrects';
      r(); return;
    }
    // Utiliser le rôle canonique retourné par le serveur (supporte les logins overridés)
    var role = (data.user && data.user.role) || id;
    if (!USERS[role]) { S.lerr = 'Rôle inconnu : ' + role; r(); return; }
    S.sessionToken = data.sessionToken;
    S.user = role;
    S.lerr = '';
    // Peupler SID depuis la réponse serveur — data.sid est un objet {fondateur, gerant, ...}
    if (data.sid && typeof data.sid === 'object') {
      Object.keys(data.sid).forEach(function(k) { SID[k] = data.sid[k]; });
    } else {
      SID[role] = data.sid; // rétrocompatibilité
    }
    S.tab = USERS[role].tabs[0];
    S.sub = S.tab==='saisie'?'fiche':S.tab==='livrables'?'treso':S.tab==='marche'?'prix':'';
    LAST_ACTIVITY = Date.now();
    S.page = 'app';
    loadLiveData();             // sync immédiate — SID déjà peuplu00e9
    setTimeout(rebuildAlimList, 50);
    setTimeout(loadPesees, 50);  // LIVE.pesees + LIVE.beteIds
    setTimeout(loadPrix, 100);
    r();
  })
  .catch(function(e){
    S.sending = false;
    S.lerr = 'Erreur réseau : ' + e.message;
    r();
  });
}

function b64bin(str) {

function getTok() {
  // Token Google obtenu via /api/token (SA cachée côté serveur)
  return new Promise(function(resolve) {
    if (S.tok && Date.now() < S.tokexp - 60000) { resolve(S.tok); return; }
    fetch('/api/token', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Session-Token': S.sessionToken || ''
      }
    })
    .then(function(res){ return res.json(); })
    .then(function(data){
      if (data.access_token) {
        S.tok    = data.access_token;
        S.tokexp = Date.now() + (data.expires_in || 3600) * 1000;
        resolve(S.tok);
      } else {
        console.error('getTok error:', data.error);
        resolve(null);
      }
    })
    .catch(function(e){ console.error('getTok fetch error:', e); resolve(null); });
  });
}

function appendRow(sid, range, vals) {
  if (!sid) return Promise.resolve({ok:false, err:'SID spreadsheet non configuré — vérifier les variables SID_* dans Vercel'});
  return getTok().then(function(tk) {
    if (!tk) return {ok:false, err:'Token invalide'};
    var sheetName = range.split('!')[0];
    var tr = TABLE_RANGES[sheetName];
    if (!tr) {
      // Feuille non référencée — append classique hors tableau formaté
      var fbSheet = encodeURIComponent(sheetName);
      var fbCols  = (range.split('!')[1] || 'A');
      var fbUrl = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+fbSheet+'!'+fbCols+':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
      return fetch(fbUrl, {method:'POST', headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json'}, body:JSON.stringify({values:[vals]})})
        .then(function(res){return res.json();})
        .then(function(d){return d.error?{ok:false,err:d.error.message}:{ok:true};});
    }
    // 1. Lire colonne A pour compter les lignes déjà saisies dans le tableau
    // Note: encodeURIComponent encode ":" en "%3A" ce que l'API Sheets n'accepte pas —
    // on encode uniquement le nom de la feuille, pas la notation A1
    var enc = encodeURIComponent(sheetName);
    var readUrl = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid
      +'/values/'+enc+'!A'+tr.start+':A'+tr.end+'?valueRenderOption=UNFORMATTED_VALUE&dateTimeRenderOption=FORMATTED_STRING';
    return fetch(readUrl, {headers:{Authorization:'Bearer '+tk}})
      .then(function(res){return res.json();})
      .then(function(d){
        var rows = (d.values || []).filter(function(r){ return r && r.length > 0 && r[0] !== ''; });
        // 2. Première ligne vide dans le tableau (sans dépasser la fin)
        var targetLine = Math.min(tr.start + rows.length, tr.end);
        // 3. Écrire exactement à cette ligne (PUT — aucune insertion de ligne)
        var writeUrl = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid
          +'/values/'+enc+'!A'+targetLine+'?valueInputOption=USER_ENTERED';
        return fetch(writeUrl, {
          method: 'PUT',
          headers: {Authorization:'Bearer '+tk, 'Content-Type':'application/json'},
          body: JSON.stringify({values:[vals]})
        });
      })
      .then(function(res){return res.json();})
      .then(function(d){
        if (d.error) {
          var _em = d.error.message || '';
          // Onglet inexistant → le créer automatiquement et réessayer une fois
          if (_em.indexOf('Unable to parse range') !== -1 || _em.indexOf('not found') !== -1) {
            var _cu = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+':batchUpdate';
            return fetch(_cu, {method:'POST', headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json'},
              body:JSON.stringify({requests:[{addSheet:{properties:{title:sheetName}}}]})})
            .then(function(){
              var _ru2 = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+enc+'!A'+tr.start+':A'+tr.end;
              return fetch(_ru2, {headers:{Authorization:'Bearer '+tk}}).then(function(r){return r.json();})
              .then(function(d2){
                var _rows2=(d2.values||[]).filter(function(r2){return r2&&r2.length>0&&r2[0]!=='';});
                var _tl2=Math.min(tr.start+_rows2.length,tr.end);
                var _wu2='https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+enc+'!A'+_tl2+'?valueInputOption=USER_ENTERED';
                return fetch(_wu2,{method:'PUT',headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json'},body:JSON.stringify({values:[vals]})});
              }).then(function(r){return r.json();}).then(function(d3){return d3.error?{ok:false,err:d3.error.message}:{ok:true};});
            }).catch(function(){ return {ok:false, err:'Impossible de créer l\'onglet "'+sheetName+'" — vérifier les permissions'}; });
          }
          return {ok:false, err:_em};
        }
        return {ok:true};
      })
      .catch(function(e){return{ok:false,err:e.message};});
  }).catch(function(e){return{ok:false,err:e.message};});
}

// ── Lecture Google Sheets ──
function readSheet(sid, range) {
  return getTok().then(function(tk) {
    if (!tk) return null;
    // ⚠️ encodeURIComponent(':') = '%3A' que l'API Sheets rejette — on encode uniquement le nom de la feuille
    var _rParts = range.split('!');
    var _rEnc = encodeURIComponent(_rParts[0]) + (_rParts[1] ? '!' + _rParts[1] : '');
    // UNFORMATTED_VALUE : nombres sans séparateurs locaux ("2000" pas "2 000" en fr-FR)
    // évite que parseFloat("2 000") = 2 pour les prix/stocks/poids
    // FORMATTED_STRING sur les dates : les cellules Date restent "DD/MM/YYYY" (pas numéro série)
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+_rEnc+'?valueRenderOption=UNFORMATTED_VALUE&dateTimeRenderOption=FORMATTED_STRING';
    return fetch(url, {headers:{Authorization:'Bearer '+tk}})
      .then(function(res){ return res.json(); })
      .then(function(d){ return d.values || []; })
      .catch(function(){ return null; });
  });
}

// Appelé au login — remplace MOCK{} par données réelles
function loadLiveData() {
  if (!S.user) return;
  LIVE.source = 'loading';

  // Helper : filtrer les lignes depuis CYCLE.dateDebut
  function apresDebut(dateFR) {
    if (!CYCLE.dateDebut) return true;
    var parts = dateFR.split('/');
    if (parts.length !== 3) return false;
    var d = new Date(parts[2], parts[1]-1, parts[0]);
    var debut = new Date(CYCLE.dateDebut);
    return d >= debut;
  }

  // Helper : valider et lire un nombre, retourne null si invalide
  function safeNum(val) {
    if (val === null || val === undefined || val === '') return null;
    var n = parseFloat(val);
    return isNaN(n) ? null : n;
  }

  var sidGerant   = SID.gerant;
  var sidFondateur = SID.fondateur;

  // ── ÉTAPE 1 — Config_Cycle + Config_App (bloquante) ──
  // Lire depuis SID.fondateur pour synchroniser CYCLE sur tout appareil
  var step1 = sidFondateur
    ? Promise.all([
        readSheet(sidFondateur, 'Config_Cycle!A1:P1'),
        readSheet(sidFondateur, 'Config_App!A:B')
      ]).then(function(res) {
        var rows    = res[0];
        var appRows = res[1];

        // ── Config_Cycle ──
        if (rows && rows[0] && rows[0][0]) {
          var row = rows[0];
          var updates = {};
          if (row[0])  updates.dateDebut      = row[0];
          if (row[1])  updates.nbBetes        = parseInt(row[1])   || CYCLE.nbBetes;
          if (row[2])  updates.poidsDepart    = parseInt(row[2])   || CYCLE.poidsDepart;
          if (row[3])  updates.race           = row[3];
          if (row[4])  updates.ration         = parseFloat(row[4]) || CYCLE.ration;
          if (row[5])  updates.capital        = parseInt(row[5])   || CYCLE.capital;
          if (row[6])  updates.objectifPrix   = parseInt(row[6])   || CYCLE.objectifPrix;
          if (row[7])  updates.budgetSante    = parseInt(row[7])   || CYCLE.budgetSante;
          if (row[8])  updates.veterinaire    = row[8];
          if (row[9])  updates.foirail        = row[9];
          if (row[10]) updates.commission     = parseFloat(row[10]) || CYCLE.commission;
          if (row[11]) updates.contactUrgence = row[11];
          if (row[12]) updates.peseeFreq      = parseInt(row[12])  || CYCLE.peseeFreq;
          try { if (row[13]) updates.betes      = JSON.parse(row[13]); } catch(e) {}
          try { if (row[14]) updates.stockLines = JSON.parse(row[14]); } catch(e) {}
          if (row[15]) updates.dureeMois      = parseInt(row[15])  || CYCLE.dureeMois; // col P
          // Détection changement de cycle — wipe immédiat sur l'appareil des autres acteurs
          var _prevDateDebut = CYCLE.dateDebut;
          Object.assign(CYCLE, updates);
          if (updates.dateDebut && _prevDateDebut && updates.dateDebut !== _prevDateDebut) {
            // Nouveau cycle détecté par un acteur non-fondateur (ou fondateur après sync)
            HISTORY = []; lsSet('history', []);
            lsSet('last_fiche', null); // effacer le marqueur fiche du jour
            LIVE.incidents = []; LIVE.pesees = []; LIVE.beteIds = [];
            CYCLE._lastFicheDate=''; CYCLE._lastSopDate=''; CYCLE._lastStockDate='';
            CYCLE._lastPeseeDate=''; CYCLE._lastIncDate=''; CYCLE._lastSanteDate='';
            CYCLE._lastBilanSem=''; MOCK.incidents=0; MOCK.stock=0;
            STOCK_MVTS=[]; saveMvts();
            lsSet('cycle', CYCLE);
          }
        }

        // ── Config_App (clé-valeur extensible) ──
        if (appRows && appRows.length) {
          appRows.forEach(function(r) {
            if (!r || !r[0]) return;
            try {
              var key = r[0]; var val = JSON.parse(r[1] || 'null');
              if (key === 'alimentTypes'  && Array.isArray(val) && val.length) CYCLE.alimentTypes   = val;
              // _last* : n'appliquer que si val est non-vide (une chaîne vide = cycle vient d'être réinitialisé)
              if (key === 'lastFicheDate' && val && val.length) CYCLE._lastFicheDate = val;
              if (key === 'lastSopDate'   && val && val.length) CYCLE._lastSopDate   = val;
              if (key === 'lastStockDate' && val && val.length) CYCLE._lastStockDate = val;
              if (key === 'lastPeseeDate' && val && val.length) CYCLE._lastPeseeDate = val;
              if (key === 'lastIncDate'   && val && val.length) CYCLE._lastIncDate   = val;
              if (key === 'lastSanteDate' && val && val.length) CYCLE._lastSanteDate = val;
              if (key === 'lastBilanSem'  && val && val.length) CYCLE._lastBilanSem  = val;
              // Si une clé _last* est explicitement vide → effacer localement aussi
              if (key === 'lastFicheDate' && val === '') { CYCLE._lastFicheDate = ''; lsSet('last_fiche', null); }
              if (key === 'lastSopDate'   && val === '') CYCLE._lastSopDate   = '';
              if (key === 'lastStockDate' && val === '') CYCLE._lastStockDate = '';
              if (key === 'lastPeseeDate' && val === '') CYCLE._lastPeseeDate = '';
              if (key === 'lastIncDate'   && val === '') CYCLE._lastIncDate   = '';
              if (key === 'lastSanteDate' && val === '') CYCLE._lastSanteDate = '';
              if (key === 'lastBilanSem'  && val === '') CYCLE._lastBilanSem  = '';
              // dureeMois : Config_App est la source prioritaire (pas de race condition)
              if (key === 'dureeMois' && val && parseInt(val) > 0) CYCLE.dureeMois = parseInt(val);
              // cycleDebut dans Config_App = détection changement de cycle indépendante de Config_Cycle
              if (key === 'cycleDebut' && val && val.length && val !== CYCLE.dateDebut) {
                HISTORY = []; lsSet('history', []);
                lsSet('last_fiche', null);
                LIVE.incidents = []; LIVE.pesees = []; LIVE.beteIds = [];
                CYCLE._lastFicheDate=''; CYCLE._lastSopDate=''; CYCLE._lastStockDate='';
                CYCLE._lastPeseeDate=''; CYCLE._lastIncDate=''; CYCLE._lastSanteDate='';
                CYCLE._lastBilanSem=''; MOCK.incidents=0; MOCK.stock=0;
                STOCK_MVTS=[]; saveMvts();
              }
            } catch(e) {}
          });
        }

        lsSet('cycle', CYCLE);
      }).catch(function() { /* Sheets inaccessible → garder CYCLE local existant */ })
    : Promise.resolve();

  step1.then(function() {
    // ── ÉTAPE 2 — Vague 1 critique (parallèle, ~1 seconde) ──
    // Pour Pesees, Stock_Nourriture et Sante_Mortalite :
    // → essayer sidGerant d'abord, puis sidFondateur en fallback.
    // Le gérant écrit dans les deux sheets via writeAll, donc les données
    // sont toujours disponibles dans au moins l'un des deux.
    var sidDataSource = sidGerant || sidFondateur;
    return Promise.all([
      sidDataSource  ? readSheet(sidDataSource,  'Pesees!A4:G200')           : Promise.resolve(null),
      sidDataSource  ? readSheet(sidDataSource,  'Stock_Nourriture!A4:F200') : Promise.resolve(null),
      sidFondateur   ? readSheet(sidFondateur,   'KPI_Mensuels!A4:K50')      : Promise.resolve(null),
      sidDataSource  ? readSheet(sidDataSource,  'Sante_Mortalite!A4:G200')  : Promise.resolve(null),
    ]).then(function(results) {
      var rowsPesees = results[0];
      var rowsStock  = results[1];
      var rowsKpi    = results[2];
      var rowsSante  = results[3];

      // Sante_Mortalite → MOCK.betes + SPARK.betes (filtré par début de cycle)
      if (rowsSante && rowsSante.length) {
        var santesCycle = rowsSante.filter(function(r){ return r[0] && apresDebut(r[0]); });
        var deces = santesCycle.filter(function(r){ return r[6] && r[6].toString().toUpperCase()==='OUI'; }).length;
        var valBetes = Math.max(0, (CYCLE.nbBetes||4) - deces);
        if (!isNaN(valBetes)) {
          MOCK.betes = valBetes;
          var actives = (CYCLE.nbBetes||4);
          var sparkBetes = [];
          santesCycle.slice(-7).forEach(function(r) {
            if (r[6] && r[6].toString().toUpperCase()==='OUI') actives = Math.max(0, actives - 1);
            sparkBetes.push(actives);
          });
          if (sparkBetes.length > 0) SPARK.betes = sparkBetes;
        }
      }

      // Pesées → MOCK.gmq + SPARK.gmq (filtré par début de cycle)
      if (rowsPesees && rowsPesees.length) {
        var peseesCycle = rowsPesees.filter(function(r){ return r[0] && apresDebut(r[0]); });
        var gains = peseesCycle.map(function(r){ return safeNum(r[5]); }).filter(function(v){ return v !== null && v > 0; });
        if (gains.length > 0) {
          var moy = gains.reduce(function(a,b){return a+b;},0) / gains.length;
          var gmq = Math.round((moy/7)*100)/100;
          if (gmq > 0 && gmq < 5) {
            MOCK.gmq = gmq;
            SPARK.gmq = gains.slice(-7).map(function(g){ return Math.round((g/7)*100)/100; });
          }
        }
      }

      // Stock_Nourriture → MOCK.stock + SPARK.stk (filtré par début de cycle)
      if (rowsStock && rowsStock.length) {
        var netKg = {};
        rowsStock.forEach(function(row) {
          if (!row[0] || !apresDebut(row[0])) return; // ignorer données hors cycle courant
          var type = row[1] || 'Inconnu';
          var kg   = safeNum(row[2]);
          if (kg !== null) netKg[type] = (netKg[type] || 0) + kg;
        });
        // Math.max(0, ...) par type : un aliment épuisé ne compense pas un autre
        var totalNet = Object.keys(netKg).reduce(function(s, k){ return s + Math.max(0, netKg[k]); }, 0);
        var rationJour = (CYCLE.ration || 12) * (CYCLE.nbBetes || 4);
        if (totalNet >= 0 && rationJour > 0) {
          var semCalc = Math.round((totalNet / (rationJour * 7)) * 10) / 10;
          if (semCalc >= 0 && semCalc <= 52) {
            MOCK.stock = semCalc;
            // Reconstituer STOCK_MVTS depuis Sheets uniquement si Sheets a plus de données que le local
            // (evite d'écraser le local qui vient d'être écrit ou les stockLines initiales du cycle)
            if (!STOCK_MVTS || STOCK_MVTS.length === 0 || rowsStock.length >= STOCK_MVTS.length) {
              var cycleDebut = CYCLE.dateDebut || todayISO();
              STOCK_MVTS = [];
              rowsStock.forEach(function(row) {
                if (!row[0] || !row[1]) return;
                var kgRow = safeNum(row[2]);
                if (kgRow === null) return;
                STOCK_MVTS.push({
                  date: row[0],
                  type: row[1],
                  mode: kgRow >= 0 ? 'ajouter' : 'consommer',
                  kg: Math.abs(kgRow),
                  cycleDebut: cycleDebut
                });
              });
              saveMvts();
            }
            SPARK.stk = rowsStock.slice(-7).map(function(row) {
              var kg = safeNum(row[2]) || 0;
              return rationJour > 0 ? Math.max(0, Math.round(kg / (rationJour * 7) * 10) / 10) : 0;
            });
          }
        } else {
          // Sheets vide (pas encore de mouvement ce cycle) → calculer depuis STOCK_MVTS local
          MOCK.stock = calcStockLocal();
        }
      }

      // 5 — Tréso estimé depuis coûts santé (fallback si KPI vide)
      if (rowsSante && rowsSante.length) {
        var totalCoutSante = rowsSante.reduce(function(sum, row) {
          var c = parseFloat(row[4]);
          return sum + (isNaN(c) ? 0 : c);
        }, 0);
        if (totalCoutSante > 0 && CYCLE.capital > 0) {
          MOCK._tresoFromSante = CYCLE.capital - totalCoutSante;
        }
      }

      // KPI_Mensuels → MOCK.treso + SPARK.treso
      if (rowsKpi && rowsKpi.length) {
        for (var i = rowsKpi.length - 1; i >= 0; i--) {
          var valTreso = safeNum(rowsKpi[i][7]);
          if (valTreso !== null && valTreso >= 0) {
            MOCK.treso = valTreso;
            SPARK.treso = rowsKpi.slice(-7).map(function(r){ return safeNum(r[7])||0; });
            MOCK._tresoFromSante = null; // KPI a priorité sur l'estimation santé
            break;
          }
        }
      } else if (MOCK._tresoFromSante !== null && MOCK._tresoFromSante !== undefined) {
        // Fallback : KPI vide → utiliser estimation depuis coûts santé
        MOCK.treso = Math.max(0, MOCK._tresoFromSante);
      }

      LIVE.source = 'live';
      r(); // → dashboard s'affiche avec vraies données

      // ── ÉTAPE 3 — Vague 2 historique (parallèle, après Vague 1) ──
      // Lire depuis SID.gerant : source de vérité complète (données gérant avant ET après writeAll fix)
      // Le fondateur a SID.gerant dans son objet SID — writeAll écrit les soumissions gérant ET fondateur dans les deux sheets
      var sidHisto = sidGerant || sidFondateur;
      return Promise.all([
        sidHisto ? readSheet(sidHisto, 'Fiche_Quotidienne!A4:G500')  : Promise.resolve(null),
        sidHisto ? readSheet(sidHisto, 'Incidents!A4:G200')          : Promise.resolve(null),
        sidHisto ? readSheet(sidHisto, 'Sante_Mortalite!A4:G200')    : Promise.resolve(null),
        // Hebdomadaire : lecture avec fallback sidFondateur si sidHisto (gérant) est vide
        // (couvre le cas où writeAll a écrit sur fondateur mais pas gérant)
        (sidHisto ? readSheet(sidHisto,'Hebdomadaire!A4:H200').then(function(rows){
          if(rows&&rows.length) return rows;
          return (sidFondateur&&sidFondateur!==sidHisto)?readSheet(sidFondateur,'Hebdomadaire!A4:H200'):(rows||[]);
        }) : Promise.resolve(null)),
        sidHisto ? readSheet(sidHisto, 'Pesees!A4:G200')             : Promise.resolve(null),
        sidHisto ? readSheet(sidHisto, 'SOP_Check!A4:H200')          : Promise.resolve(null),
        sidHisto ? readSheet(sidHisto, 'Stock_Nourriture!A4:F200')   : Promise.resolve(null),
      ]).then(function(hist) {
        var fiches    = (hist[0] || []).filter(function(r){ return r[0] && apresDebut(r[0]); });
        var incidents = (hist[1] || []).filter(function(r){ return r[0] && apresDebut(r[0]); });
        var santes    = (hist[2] || []).filter(function(r){ return r[0] && apresDebut(r[0]); });
        // Hebdomadaire col A = numéro de semaine (ex: "1"), pas une date — pas de filtre apresDebut
        var bilans    = (hist[3] || []).filter(function(r){ return r[0]; });
        var pesees    = (hist[4] || []).filter(function(r){ return r[0] && apresDebut(r[0]); });
        var sops      = (hist[5] || []).filter(function(r){ return r[0] && apresDebut(r[0]); });
        var stocks    = (hist[6] || []).filter(function(r){ return r[0] && apresDebut(r[0]); });
        // Reconstruire STOCK_MVTS depuis Vague 2 uniquement si Sheets a plus ou autant de données
        // (evite d'écraser le local après un submit récent ou les stockLines initiales non encore en Sheets)
        if (stocks.length > 0 && (!STOCK_MVTS || STOCK_MVTS.length === 0 || stocks.length >= STOCK_MVTS.length)) {
          var cycleDebut2 = CYCLE.dateDebut || todayISO();
          STOCK_MVTS = [];
          stocks.forEach(function(row) {
            if (!row[0] || !row[1]) return;
            var kgRow2 = parseFloat(row[2]);
            if (isNaN(kgRow2)) return;
            STOCK_MVTS.push({
              date: row[0], type: row[1],
              mode: kgRow2 >= 0 ? 'ajouter' : 'consommer',
              kg: Math.abs(kgRow2), cycleDebut: cycleDebut2
            });
          });
          saveMvts();
        }
        buildHistoryFromSheets(fiches, incidents, santes, bilans, pesees, sops, stocks);
        _lastSyncTS = Date.now(); // ✓ marquer le moment de la synchro réussie
        r(); // → sidebar et alertes se mettent à jour
      }).catch(function() {
        // Vague 2 échouée — Vague 1 déjà affichée, pas critique
      });

    }).catch(function() {
      // Sheets inaccessible (Vague 1) → ne pas écraser localStorage
      LIVE.source = 'cache';
      r(); // → badge Cache affiché
    });

  }).catch(function() {
    LIVE.source = 'cache';
    r();
  });
}

// ── Reconstruction HISTORY depuis les données Sheets (Agent 3) ──
// Appelée après la Vague 2 de loadLiveData()
// Paramètres : tableaux de lignes brutes filtrées depuis CYCLE.dateDebut
function buildHistoryFromSheets(fiches, incidents, santes, bilans, pesees, sops, stocks) {
  var icons = { fiche:'📋', inc:'⚠️', sante:'💊', bilan:'📊', pesee:'⚖️', sop:'✅', stock:'🌾' };

  // Helper : convertir date FR "dd/mm/yyyy" en objet Date
  function parseFR(dateFR) {
    var p = dateFR ? dateFR.split('/') : [];
    if (p.length !== 3) return null;
    return new Date(p[2], p[1]-1, p[0]);
  }

  // 1. Convertir chaque onglet en entrées HISTORY
  var entries = [];

  // Fiche_Quotidienne [date, nb, nourris, eau, enclos, incident, desc]
  (fiches || []).forEach(function(r) {
    if (!r[0]) return;
    entries.push({ type:'fiche', label:'Fiche du '+r[0], icon:icons.fiche,
      date:r[0], time:'08:00', _src:'sheets' });
  });

  // Incidents [date, id, type, grav, desc, act, clos]
  LIVE.incidents = [];
  (incidents || []).forEach(function(r) {
    if (!r[0]) return;
    var id = r[1] || '—'; var typeInc = r[2] || '—';
    LIVE.incidents.push({ date:r[0], id:r[1]||'', type:r[2]||'', grav:r[3]||'1', desc:r[4]||'', act:r[5]||'', clos:r[6]||'' });
    entries.push({ type:'inc', label:id+' \u2014 '+typeInc, icon:icons.inc,
      date:r[0], time:'—', _id:id, _typeInc:typeInc, _src:'sheets' });
  });

  // Sante_Mortalite [date, id, sym, tra, cout, res, dec]
  (santes || []).forEach(function(r) {
    if (!r[0]) return;
    var id = r[1] || '—'; var sym = r[2] || '—';
    entries.push({ type:'sante', label:id+' \u2014 '+sym, icon:icons.sante,
      date:r[0], time:'—', _id:id, _sym:sym, _src:'sheets' });
  });

  // Hebdomadaire [sem, nb, nou, stk, inc, poi, al, msg]
  (bilans || []).forEach(function(r) {
    if (!r[0]) return;
    // Extraire le numéro de semaine pour la détection _bilanOk (date=r[0] n'est pas DD/MM/YYYY)
    var _semNum = r[0].toString().replace(/[^0-9]/g, '');
    entries.push({ type:'bilan', label:'Semaine '+r[0], icon:icons.bilan,
      date:r[0], _sem:_semNum, time:'—', _src:'sheets' });
  });

  // Pesees [date, id, race, poids, prev, gain, statut]
  (pesees || []).forEach(function(r) {
    if (!r[0]) return;
    var id = r[1] || '\u2014'; var poids = r[3] || '\u2014';
    entries.push({ type:'pesee', label:id+' \u2014 '+poids+'kg', icon:icons.pesee,
      date:r[0], time:'\u2014', _id:id, _src:'sheets' });
  });

  // SOP_Check [date, net, des, rat, eau, stk, san, prob]
  (sops || []).forEach(function(r) {
    if (!r[0]) return;
    entries.push({ type:'sop', label:'SOP du '+r[0], icon:icons.sop,
      date:r[0], time:'\u2014', _src:'sheets' });
  });

  // Stock_Nourriture [date, type, kg, ...] — 1 entrée HISTORY par date unique
  var stockDates = {};
  (stocks || []).forEach(function(r) {
    if (!r[0] || stockDates[r[0]]) return;
    stockDates[r[0]] = true;
    entries.push({ type:'stock', label:'Stock du '+r[0], icon:icons.stock,
      date:r[0], time:'\u2014', _src:'sheets' });
  });

  // 2. Fusionner avec localStorage — Sheets gagne pour les clés existantes
  // Garder les entrées locales qui n'ont PAS de doublon dans Sheets
  var sheetsKeys = {};
  entries.forEach(function(e) {
    sheetsKeys[e.type + '|' + e.date + '|' + (e._id || '')] = true;
  });

  // Types pour lesquels Sheets est définitivement vide ce cycle (source de vérité)
  // → tout orphelin local de ce type est invalide (cycle reset ou jamais soumis)
  var _emptyInSheets = {};
  if (!fiches.length)    _emptyInSheets['fiche']  = true;
  if (!sops.length)      _emptyInSheets['sop']    = true;
  if (!bilans.length)    _emptyInSheets['bilan']  = true;
  if (!santes.length)    _emptyInSheets['sante']  = true;
  if (!pesees.length)    _emptyInSheets['pesee']  = true;
  if (!incidents.length) _emptyInSheets['inc']    = true;
  if (!stocks.length)    _emptyInSheets['stock']  = true;

  // Filtre cycle : rejeter les entrées locales antérieures au début du cycle courant
  var _cycleStart = CYCLE.dateDebut ? new Date(CYCLE.dateDebut) : null;
  var localOnly = (HISTORY || []).filter(function(h) {
    if (h._src === 'sheets') return false; // déjà issu de Sheets
    if (_emptyInSheets[h.type]) return false; // Sheets vide pour ce type → orphelin invalide
    // Exclure les entrées d'un cycle précédent survivant en localStorage
    if (_cycleStart && h.date) {
      var _p = h.date.split('/');
      if (_p.length === 3) {
        var _hd = new Date(_p[2], _p[1]-1, _p[0]);
        if (_hd < _cycleStart) return false;
      }
    }
    var key = h.type + '|' + h.date + '|' + (h._id || '');
    return !sheetsKeys[key]; // garder si pas de doublon Sheets
  });

  var merged = entries.concat(localOnly);

  // 3. Dédupliquer — clé unique = type + date + (_id si applicable)
  var seen = {};
  var deduped = [];
  merged.forEach(function(e) {
    var key = e.type + '|' + e.date + '|' + (e._id || '');
    if (seen[key]) {
      // En cas de doublon : garder l'entrée Sheets (déjà dans entries en premier)
      if (e._src === 'sheets') { seen[key] = e; }
    } else {
      seen[key] = e;
      deduped.push(key);
    }
  });
  var result = deduped.map(function(k) { return seen[k]; });

  // 4. Trier par date décroissante — les bilans utilisent une date synthétique
  // basée sur CYCLE.dateDebut + _sem semaines pour ne pas être éjectés en queue
  var _cycleDebutD = CYCLE.dateDebut ? new Date(CYCLE.dateDebut) : null;
  function _entryDate(e) {
    if (e.type === 'bilan' && e._sem && _cycleDebutD) {
      var _d = new Date(_cycleDebutD.getTime() + (parseInt(e._sem, 10) - 1) * 7 * 86400000);
      return _d;
    }
    return parseFR(e.date);
  }
  result.sort(function(a, b) {
    var da = _entryDate(a), db = _entryDate(b);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return db - da;
  });

  // 5. Limiter à 100 entrées (les bilans (max ~40/cycle) doivent survivre au slice)
  result = result.slice(0, 100);

  // 6. Sauvegarder dans localStorage ET mettre à jour HISTORY global
  HISTORY = result;
  lsSet('history', HISTORY);

  // Effacer les marqueurs locaux pour les types absents des Sheets (source de vérité)
  var _cycleChanged = false;
  if (_emptyInSheets['fiche'])  { lsSet('last_fiche', null); CYCLE._lastFicheDate = ''; _cycleChanged = true; }
  if (_emptyInSheets['sop'])    { CYCLE._lastSopDate   = ''; _cycleChanged = true; }
  // Note : _lastBilanSem n'est pas effacé ici — saveCycle() s'en charge au reset cycle.
  // Le fallback sidFondateur sur Hebdomadaire évite les faux _emptyInSheets['bilan'].
  if (_emptyInSheets['pesee'])  { CYCLE._lastPeseeDate = ''; _cycleChanged = true; }
  if (_emptyInSheets['stock'])  { CYCLE._lastStockDate = ''; _cycleChanged = true; }
  if (_emptyInSheets['inc'])    { CYCLE._lastIncDate   = ''; _cycleChanged = true; }
  if (_emptyInSheets['sante'])  { CYCLE._lastSanteDate = ''; _cycleChanged = true; }
  if (_cycleChanged) lsSet('cycle', CYCLE);

  // 7. Mettre à jour MOCK.incidents — incidents de la semaine courante (lun→dim, fuseau Dakar)
  var _n = _nowDakar();
  var _todayD = new Date(_n.year, _n.month-1, _n.day);
  var _wd = _todayD.getDay(); // 0=dim
  var _lundi = new Date(_todayD);
  _lundi.setDate(_todayD.getDate() - (_wd === 0 ? 6 : _wd - 1));
  var _incCnt = 0;
  result.forEach(function(h) {
    if (h.type !== 'inc') return;
    var p = h.date ? h.date.split('/') : [];
    if (p.length !== 3) return;
    var d = new Date(p[2], p[1]-1, p[0]);
    if (d >= _lundi) _incCnt++;
  });
  MOCK.incidents = _incCnt;

  return HISTORY;
}

function doSubmit(type) {
  // ── VALIDATIONS CHAMPS OBLIGATOIRES ──
  if (type==='fiche' && !S.fi.nb) {
    S.msg='err:Saisir le nombre de bêtes'; r(); return;
  }
  if (type==='stock' && (!S.fst.mvts || S.fst.mvts.length===0)) {
    S.msg='err:Ajouter au moins un mouvement de stock'; r(); return;
  }
  if (type==='stock' && !S.fst.rat) {
    S.msg='err:Saisir la ration journalière totale'; r(); return;
  }
  if (type==='inc' && (!S.fin.id || !S.fin.type || !S.fin.desc)) {
    S.msg='err:ID bête, type et description sont obligatoires'; r(); return;
  }
  if (type==='pesee' && (!S.fp.id || !S.fp.poids)) {
    S.msg='err:ID bête et poids sont obligatoires'; r(); return;
  }
  if (type==='sante' && (!S.fsa.id || !S.fsa.sym)) {
    S.msg='err:ID bête et symptômes sont obligatoires'; r(); return;
  }
  if (type==='bilan' && (!S.fb.nb || !S.fb.stk)) {
    S.msg='err:Nb bêtes et stock sont obligatoires'; r(); return;
  }

  // ── ANTI-DOUBLONS CALENDAIRES ──

  // Fiche : 1 seule par jour calendaire (toute la journée)
  if (type==='fiche' && ficheDejaSoumise()) {
    showConfirm('📋 Fiche du '+isoToFr(S.fi.date||todayISO())+' déjà envoyée.\nEnvoyer une 2ème fiche quand même ?', function(){
      _submitActual('fiche');
    });
    return;
  }

  // Bilan : 1 seul par semaine calendaire
  if (type==='bilan' && bilanDejaFaitCetteSemaine()) {
    showConfirm('📊 Bilan du '+today()+' déjà envoyé.\nEnvoyer un 2ème bilan quand même ?', function(){
      _submitActual('bilan');
    });
    return;
  }

  // SOP : 1 seul tous les 14 jours
  if (type==='sop' && sopDejaFait()) {
    showConfirm('✅ SOP déjà soumis il y a moins de 14 jours.\nSoumettre quand même ?', function(){
      _submitActual('sop');
    });
    return;
  }

  // Pesée : même bête, même semaine
  if (type==='pesee' && S.fp.id && peseeDejaFaite(S.fp.id)) {
    showConfirm('⚖️ '+S.fp.id+' a déjà été pesée cette semaine.\nSaisir quand même ?', function(){
      _submitActual('pesee');
    });
    return;
  }

  // Incident : même bête + même type d'incident aujourd'hui
  if (type==='inc' && S.fin.id && S.fin.type && incidentDejaEnregistre(S.fin.id, S.fin.type)) {
    showConfirm('⚠️ Incident "'+S.fin.type+'" déjà enregistré pour '+S.fin.id+' aujourd\'hui.\nEnregistrer un 2ème ?', function(){
      _submitActual('inc');
    });
    return;
  }

  // Santé : même bête + même symptôme aujourd'hui
  if (type==='sante' && S.fsa.id && S.fsa.sym && santeDejaEnregistree(S.fsa.id, S.fsa.sym)) {
    showConfirm('💊 Fiche santé "'+S.fsa.sym+'" déjà enregistrée pour '+S.fsa.id+' aujourd\'hui.\nEnregistrer quand même ?', function(){
      _submitActual('sante');
    });
    return;
  }

  // ── CONFIRMATIONS SÉCURITÉ ──

  // Décès
  if (type==='sante' && S.fsa.dec==='OUI') {
    showConfirm('🔴 DÉCÈS — Confirmer la déclaration ? La direction sera alertée immédiatement.', function(){
      _submitActual('sante');
    });
    return;
  }

  // Incident URGENCE gravité 3
  if (type==='inc' && S.fin.grav==='3') {
    showConfirm('🚨 URGENCE Gravité 3 — Confirmer et alerter la direction ?', function(){
      _submitActual('inc');
    });
    return;
  }

  _submitActual(type);
}

function _submitActual(type) {
  S.sending=true;
  // Compter combien de sheets sont impliqués pour le message
  S.msg='load';
  r();
  var p;

  // Écriture simultanée dans plusieurs sheets avec indicateur
  function writeAll(sids, range, vals) {
    var validSids = sids.filter(function(s){ return !!s; }); // ignorer SIDs non définis
    if (!validSids.length) {
      // Aucun SID valide — probablement SID_GERANT ou SID_FONDATEUR non configuré dans Vercel
      console.warn('writeAll: aucun SID valide pour la plage', range, '— vérifier les variables SID_* dans Vercel');
      return Promise.resolve({ok:false, err:'SID non configuré — contacter l\'administrateur'});
    }
    S._sendCount = validSids.length;
    S._sendSheet = range.split('!')[0];
    return Promise.all(validSids.map(function(sid){ return appendRow(sid, range, vals); }))
      .then(function(results){
        var ok = results.find(function(r){return r&&r.ok;});
        if(ok) return ok;
        // Toutes les écritures ont échoué — enrichir le message d'erreur
        var first = results[0];
        if(first && first.err && first.err.indexOf('not found') !== -1) {
          first.err = 'Onglet introuvable : "'+range.split('!')[0]+'" — vérifier les onglets du Google Sheet';
        }
        return first;
      });
  }
  function kpiAppend(vals) {
    // Écrire dans KPI_Mensuels seulement si SID.fondateur est disponible
    if (!SID.fondateur) return Promise.resolve({ok:true});
    return appendRow(SID.fondateur, 'KPI_Mensuels!A:K', vals);
  }
  function kpiHebdoAppend(vals) {
    if (!SID.fondateur) return Promise.resolve({ok:true});
    return appendRow(SID.fondateur, 'KPI_Hebdo!A:J', vals);
  }

  if(type==='fiche'){
    var f=S.fi; var td=isoToFr(f.date);
    p=writeAll([SID.gerant,SID.fondateur],'Fiche_Quotidienne!A:G',[td,f.nb,f.nourris,f.eau,f.enclos,f.incident,f.desc])
    .then(function(res){if(res.ok)return kpiAppend([td,'','','','','','','',f.incident==='OUI'?1:0,'','']);return res;});
  } else if(type==='sop'){
    var f=S.fs; var td=isoToFr(f.date);
    p=writeAll([SID.gerant,SID.fondateur,SID.rga],'SOP_Check!A:H',[td,f.net,f.des,f.rat,f.eau,f.stk,f.san,f.prob]);
  } else if(type==='stock'){
    var f=S.fst; var td=isoToFr(f.date);
    var mvts = f.mvts || [];
    var cycleDebut = CYCLE.dateDebut || todayISO();
    // Fallback ration depuis CYCLE si non saisie
    var rat = parseFloat(f.rat) || Math.round((CYCLE.ration||12) * (CYCLE.nbBetes||4));
    if(!f.rat && rat) { f.rat = String(rat); S.fst.rat = f.rat; }
    // Calculer total net et semaines restantes depuis STOCK_MVTS complet (pas juste ce submit)
    var allMvts = STOCK_MVTS.concat(mvts.map(function(m){ return {type:m.type,mode:m.mode,kg:m.kg}; }));
    var netParType = {};
    allMvts.forEach(function(m){ netParType[m.type]=(netParType[m.type]||0)+(m.mode==='ajouter'?m.kg:-m.kg); });
    var totalNetAll = Object.keys(netParType).reduce(function(s,t){ return s+Math.max(0,netParType[t]); },0);
    var totalNet = mvts.reduce(function(s,m){ return s + (m.mode==='ajouter' ? m.kg : -m.kg); }, 0);
    var sem = rat>0 ? (totalNetAll/(rat*7)).toFixed(1) : 0;
    // Enregistrer chaque mouvement dans STOCK_MVTS (1 entrée = 1 action)
    mvts.forEach(function(m){

// Écrit les variables étendues dans l'onglet Config_App (format clé-valeur)
// L'onglet est créé automatiquement s'il n'existe pas encore
function _syncConfigApp() {
  if (!SID.fondateur) return Promise.resolve();
  return getTok().then(function(tk) {
    if (!tk) return;
    var sid = SID.fondateur;
    var rows = [
      ['alimentTypes',  JSON.stringify(CYCLE.alimentTypes   || [])],
      ['lastFicheDate', JSON.stringify(CYCLE._lastFicheDate  || '')],
      ['lastSopDate',   JSON.stringify(CYCLE._lastSopDate    || '')],
      ['lastStockDate', JSON.stringify(CYCLE._lastStockDate  || '')],
      ['lastPeseeDate', JSON.stringify(CYCLE._lastPeseeDate  || '')],
      ['lastIncDate',   JSON.stringify(CYCLE._lastIncDate    || '')],
      ['lastSanteDate', JSON.stringify(CYCLE._lastSanteDate  || '')],
      ['lastBilanSem',  JSON.stringify(CYCLE._lastBilanSem   || '')],
      ['dureeMois',     JSON.stringify(CYCLE.dureeMois       || 8)],
      ['cycleDebut',    JSON.stringify(CYCLE.dateDebut       || '')] // clé comparée par les autres acteurs
    ];
    // Tenter création de l'onglet (ignorer l'erreur s'il existe déjà)
    var addUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + sid + ':batchUpdate';
    fetch(addUrl, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + tk, 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [{ addSheet: { properties: { title: 'Config_App' } } }] })
    }).catch(function(){});
    // PUT direct — indépendant de la création de l'onglet (l'onglet existe dans 99% des cas)
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + sid + '/values/' + encodeURIComponent('Config_App!A1') + '?valueInputOption=USER_ENTERED';
    return fetch(url, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + tk, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: rows })
    }).then(function(r){ return r.json(); }).catch(function(){ return {}; });
  }).catch(function(){ return Promise.resolve(); });
}

// Écrit toute la ligne Config_Cycle!A1:O1 dans les 4 sheets disponibles
function _syncCycle() {

// ── SPARKLINES ──
function sparkline(data, color, w, h) {
  if (!data || data.length < 2) return '';
  w = w || 80; h = h || 24;
  var min = Math.min.apply(null, data);
  var max = Math.max.apply(null, data);
  var range = max - min || 1;
  var pts = data.map(function(v, i) {
    var x = (i / (data.length - 1)) * w;
    var y = h - ((v - min) / range) * (h - 4) - 2;
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  return '<svg width="'+w+'" height="'+h+'" style="display:block">'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}

var LIVE = {
  pesees:    [],
  beteIds:   [],
  prix:      [],  // [{date, foi, bas, moy, haut}] depuis Suivi_Marche
  incidents: [],  // { date, id, type, grav, desc, act, clos } — chargées depuis Vague 2

// Charge les pesées depuis Sheets pour les courbes de croissance
function loadPesees() {
  if (!S.user) return;
  readSheet(SID.gerant, 'Pesees!A4:G50').then(function(rows) {
    if (!rows) return;

    // Parser les dates dd/mm/yyyy → Date object
    function parseDate(str) {
      if (!str) return null;
      var p = String(str).split('/');
      if (p.length !== 3) return null;
      return new Date(p[2], p[1]-1, p[0]);
    }

    var raw = rows.filter(function(r){ return r[0] && r[1]; })
      .map(function(r){
        return {
          date:  r[0]||'',
          id:    r[1]||'',
          race:  r[2]||'',
          poids: parseFloat(r[3])||0,
          prev:  parseFloat(r[4])||0,
          gain:  parseFloat(r[5])||0,
          gmq:   0  // calculé ci-dessous
        };
      });

    // Calculer GMQ réel entre pesées consécutives par bête
    // Trier par bête puis par date
    var byBete = {};
    raw.forEach(function(p){
      if (!byBete[p.id]) byBete[p.id] = [];
      byBete[p.id].push(p);
    });

    Object.keys(byBete).forEach(function(id){
      var pesees = byBete[id];
      // Trier chronologiquement
      pesees.sort(function(a,b){
        var da=parseDate(a.date), db=parseDate(b.date);
        return da&&db ? da-db : 0;
      });
      pesees.forEach(function(p, i){
        if (i === 0 || !p.prev || !p.gain) {
          // Première pesée : utiliser 30j par défaut si gain connu
          p.gmq = p.gain ? Math.round((p.gain/30)*100)/100 : 0;
        } else {
          var prev = pesees[i-1];
          var dCurr = parseDate(p.date);
          var dPrev = parseDate(prev.date);
          if (dCurr && dPrev) {
            var jours = Math.round((dCurr - dPrev) / 86400000);
            p.gmq = jours > 0 ? Math.round((p.gain/jours)*100)/100 : 0;
          } else {
            p.gmq = p.gain ? Math.round((p.gain/30)*100)/100 : 0;
          }
        }
      });
    });

    LIVE.pesees = raw;

    // IDs uniques — seed avec CYCLE.betes ou fallback B01..BNN pour ne jamais perdre les bêtes non encore pesées
    var ids = {};
    if (CYCLE.betes && CYCLE.betes.length) {
      CYCLE.betes.forEach(function(b){ if(b.id) ids[b.id] = true; });
    } else {
      var _nB = CYCLE.nbBetes || MOCK.betes || 4;
      for (var _bi = 1; _bi <= _nB; _bi++) ids['B' + ('0'+_bi).slice(-2)] = true;
    }
    LIVE.pesees.forEach(function(p){ if(p.id) ids[p.id] = true; });
    LIVE.beteIds = Object.keys(ids).sort();
    LIVE.loaded = true;
    r();
  });
}

var SWIPE = { x0:0, y0:0, active:false, dir:0 }; // dir: -1=gauche, 1=droite

function initSwipe() {
  var el = document.getElementById('tab-wrap');
  if (!el) return;
  el.addEventListener('touchstart', function(e){
    SWIPE.x0 = e.touches[0].clientX;
    SWIPE.y0 = e.touches[0].clientY;
    SWIPE.active = true;
  }, {passive:true});
  el.addEventListener('touchend', function(e){
    if (!SWIPE.active) return;
    var dx = e.changedTouches[0].clientX - SWIPE.x0;
    var dy = e.changedTouches[0].clientY - SWIPE.y0;
    SWIPE.active = false;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)*1.5) return; // pas assez horizontal
    var utabs = USERS[S.user].tabs;
    var idx = utabs.indexOf(S.tab);
    if (dx < 0 && idx < utabs.length-1) chTabSwipe(utabs[idx+1], 'left');
    if (dx > 0 && idx > 0) chTabSwipe(utabs[idx-1], 'right');
  }, {passive:true});
}

function chTabSwipe(t, dir) {
  // Animer sortie
  var wrap = document.getElementById('tab-content');
  if (wrap) {
    wrap.classList.add(dir==='left' ? 'slide-left' : 'slide-right');
  }
  setTimeout(function(){
    SWIPE.dir = dir==='left' ? -1 : 1;
    chTab(t);
  }, 290);
}

  S.tab=t; S.msg=''; S.dd=false;

function cancelReset() {
  S._resetPwdOpen = false;
  S._resetPwd = '';
  S._resetPwdError = '';
  S._resetGoCheck = false;
  r();
}

function verifyAndReset() {
  // Ouvrir la popup de confirmation (mot de passe + cases Go/No-Go)
  S._resetPwd = '';
  S._resetPwdError = '';
  S._resetGoCheck = false; // case à cocher confirmation Go/No-Go
  S._resetPwdOpen = true;
  r();
}

// Valider mot de passe + case Go/No-Go cochée
function confirmResetWithPwd() {
  var pwdEl = document.getElementById('reset-pwd-input');
  if(pwdEl) S._resetPwd = pwdEl.value;
  if (!S._resetGoCheck) {
    S._resetPwdError = 'Cochez la case de confirmation Go/No-Go';
    r(); return;
  }
  if (!S._resetPwd) {
    S._resetPwdError = 'Saisir votre mot de passe';
    r(); return;
  }
  // Vérifier via /api/auth (pwd côté serveur)
  S._resetPwdError = '';
  fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ login: 'fondateur', password: S._resetPwd })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    if (!data.ok) {
      S._resetPwdError = 'Mot de passe incorrect';
      r(); return;
    }
    // Tout OK — ouvrir la modale init
    S._resetPwdOpen = false;
    S._resetPwd = '';
    S._resetPwdError = '';
    S._resetGoCheck = false;
    MODAL.open = true;
    MODAL.step = 1;
    MODAL.data = Object.assign({}, CYCLE);
    closeSB();
    r();
  })
  .catch(function(){ S._resetPwdError = 'Erreur réseau'; r(); });
}

function addStockLigne(mode){
  mode = mode || 'ajouter';
  // Lire depuis le DOM en priorité (plus fiable qu'oninput avec datalist)
  var typeEl = document.getElementById('stk-type-inp');
  var kEl    = document.getElementById('stk-kg-inp');
  var t = (typeEl ? typeEl.value : S.fst.stockInput || '').trim();
  var k = parseFloat(kEl ? kEl.value : S.fst.stockKg) || 0;

  if (!t) { S.msg = 'err:Saisir un type d\'aliment'; r(); return; }
  if (k <= 0) { S.msg = 'err:Quantité doit être > 0'; r(); return; }

  if (!S.fst.mvts) S.fst.mvts = [];
  if (mode === 'consommer') {
    var stockParT = calcStockParAliment();
    var pendingNet = S.fst.mvts.reduce(function(s, mv) {
      return mv.type === t ? s + (mv.mode === 'ajouter' ? mv.kg : -mv.kg) : s;
    }, 0);
    var dispo = Math.max(0, (stockParT[t] || 0) + pendingNet);
    if (k > dispo) { S.msg = 'err:Stock insuffisant pour '+t+' (dispo\u00a0: '+dispo+'\u00a0kg)'; r(); return; }
  }

  // Sauvegarder le type dans CYCLE.alimentTypes pour suggestions futures
  if (!CYCLE.alimentTypes) CYCLE.alimentTypes = [];
  if (CYCLE.alimentTypes.indexOf(t) === -1) {
    CYCLE.alimentTypes.push(t);
    lsSet('cycle', CYCLE);
    rebuildAlimList(); // mettre à jour le datalist immédiatement
    _syncConfigApp();  // persister dans Config_App (fondateur sheet)
  }

  // Chaque clic = une entrée distincte (ajout OU consommation)
  S.fst.mvts.push({ type: t, mode: mode, kg: k });

  // Réinitialiser les champs
  S.fst.stockInput = '';
  S.fst.stockKg = '';
  S.msg = '';
  if(kEl) kEl.value = '';
  if(typeEl) typeEl.value = '';
  r();
  // Refocaliser sur le champ type pour permettre d'ajouter la prochaine ligne sans fermer le clavier
  setTimeout(function(){ var e=document.getElementById('stk-type-inp'); if(e) e.focus(); }, 30);
}

// Construire le contexte complet pour Claude
function buildAIContext() {
  var sem = calcSemaine();
  var mort = CYCLE.nbBetes > 0
    ? Math.round(((CYCLE.nbBetes||4) - MOCK.betes) / (CYCLE.nbBetes||4) * 100)
    : 0;

  // Synthèse stock
  var netKg = {};
  (STOCK_MVTS||[]).forEach(function(m){
    netKg[m.type] = (netKg[m.type]||0) + (m.mode==='ajouter' ? m.kg : -m.kg);
  });
  var stockDetail = Object.keys(netKg).map(function(t){
    return t + ': ' + Math.max(0, Math.round(netKg[t])) + ' kg';
  }).join(', ') || 'Aucun mouvement enregistré';

  // Pesées récentes
  var paseesRecentes = LIVE.loaded && LIVE.pesees.length
    ? LIVE.pesees.slice(0,6).map(function(p){
        return p.id + ' (' + p.race + ') : ' + p.poids + ' kg, GMQ=' + (p.gmq||'?') + ' kg/j';
      }).join(' | ')
    : 'Non chargées';

  // Prix foirail récents
  var prixRecents = LIVE.prix && LIVE.prix.length
    ? LIVE.prix.slice(0,3).map(function(p){
        return p.foi + ' ' + p.date + ': moy=' + fmt(p.moy||0) + ' FCFA/kg';
      }).join(' | ')
    : 'Non chargés';

  // Historique incidents récents
  var incidents = HISTORY.filter(function(h){ return h.type==='inc'; }).slice(0,5)
    .map(function(h){ return h.date + ': ' + h.label; }).join(' | ') || 'Aucun';

  // Historique santé récents
  var sante = HISTORY.filter(function(h){ return h.type==='sante'; }).slice(0,5)
    .map(function(h){ return h.date + ': ' + h.label; }).join(' | ') || 'Aucun';

  return [
    '=== CONTEXTE CYCLE BOANR ===',
    'Date début: ' + (CYCLE.dateDebut ? isoToFr(CYCLE.dateDebut) : 'Non définie'),
    'Semaine courante: ' + sem + ' / ' + Math.round((CYCLE.dureeMois||8)*4.33),
    'Durée prévue: ' + (CYCLE.dureeMois||8) + ' mois',
    '',
    '=== TROUPEAU ===',
    'Bêtes actives: ' + MOCK.betes + ' / ' + (CYCLE.nbBetes||4),
    'Race: ' + (CYCLE.race||'Non définie'),
    'Mortalité cycle: ' + mort + '%',
    'Poids départ moyen: ' + (CYCLE.poidsDepart||270) + ' kg',
    'GMQ moyen actuel: ' + MOCK.gmq + ' kg/j (cible ≥ 1.0 kg/j)',
    '',
    '=== ALIMENTATION ===',
    'Ration journalière: ' + (CYCLE.ration||12) + ' kg/bête/jour',
    'Stock restant: ' + (MOCK.stock > 0 ? MOCK.stock : calcStockLocal()) + ' semaines',
    'Détail stock: ' + stockDetail,
    '',
    '=== FINANCES ===',
    'Capital investi: ' + fmt(CYCLE.capital||0) + ' FCFA',
    'Trésorerie actuelle: ' + fmt(MOCK.treso) + ' FCFA',
    'Objectif prix vente: ' + fmt(CYCLE.objectifPrix||2000) + ' FCFA/kg',
    'Budget santé: ' + fmt(CYCLE.budgetSante||0) + ' FCFA',
    'Foirail principal: ' + (CYCLE.foirail||'Thiès'),
    '',
    '=== PESÉES RÉCENTES ===',
    paseesRecentes,
    '',
    '=== PRIX MARCHÉ RÉCENTS ===',
    prixRecents,
    '',
    '=== INCIDENTS RÉCENTS ===',
    incidents,
    '',
    '=== SANTÉ RÉCENTE ===',
    sante,
    '',
    '=== LOCALISATION ===',
    'Élevage à Thiès/Thiénaba, Sénégal. Pilotage à distance depuis la France.',
    'Espèces: bovins engraissement (Djakoré / Gobra).',
    'Vente prévue au foirail local.',
  ].join('\n');
}

// Appel API Claude
function askAI(question) {
  if (S._aiLoading) return;
  S._aiLoading = true;
  S._aiResult  = '';
  S._aiError   = '';
  r();

  var systemPrompt = 'Tu es un expert en élevage bovin engraissement en Afrique de l\'Ouest, '
    + 'spécialisé dans les races Djakoré et Gobra au Sénégal. '
    + 'Tu analyses les données d\'un cycle d\'engraissement et donnes des recommandations '
    + 'pratiques, précises et actionnables. '
    + 'Tu réponds en français, de manière concise (max 300 mots). '
    + 'Tu utilises les données fournies pour personnaliser chaque réponse. '
    + 'Si les données sont insuffisantes, tu le signales clairement.\n\n'
    + buildAIContext();

  fetch('/api/ai', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Session-Token': S.sessionToken || ''
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1024,
      system: systemPrompt,
      messages: [{ role: 'user', content: question }]
    })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    S._aiLoading = false;
    if (data && data.content && data.content[0] && data.content[0].text) {
      S._aiResult = data.content[0].text;
    } else if (data && data.error) {
      S._aiError = 'Erreur API : ' + (data.error.message || 'inconnue');
    } else {
      S._aiError = 'Réponse inattendue de l\'API.';
    }
    r();
  })
  .catch(function(e){
    S._aiLoading = false;
    S._aiError = 'Erreur réseau : ' + e.message;
    r();
  });
}

  var bd2   = light ? '#c8dcc8' : '#1a3a1a';   // bordures subtiles
  var txtH  = light ? '#1a2e1a' : '#ffffff';   // titre question
  var txtS  = light ? '#557755' : '#88aa88';   // sous-titre / label
  var txtR  = light ? '#1a2e1a' : '#f0f0f0';   // texte résultat
  var txtA  = light ? '#2d6a2d' : '#C8A06A';   // accent doré/vert
  var bgInp = light ? '#ffffff' : '#0f1a0f';   // fond input
  var txtIn = light ? '#1a2e1a' : '#ffffff';   // texte input
  var bdInp = light ? '#99bb99' : '#2a4a2a';   // bordure input
  var bgBtn = light ? 'linear-gradient(135deg,#2d6a2d,#1a5a1a)' : 'linear-gradient(135deg,#2d6a2d,#1a3a1a)';
  var bgNew = light ? '#e8f5e8' : '#1a2e1a';
  var bdNew = light ? '#99cc99' : '#2a4a2a';
  var txtNew= light ? '#2d6a2d' : '#ccc';

  var questionsHtml = AI_QUESTIONS.map(function(q){
    return '<button type="button" onclick="S._aiQuestion=\''+q.q.replace(/'/g,"\\'")+'\';askAI(S._aiQuestion)" '
      +'style="display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;'
      +'background:'+bg1+';border:1px solid '+bd1+';border-radius:8px;'
      +'font-size:14px;cursor:pointer;text-align:left;margin-bottom:8px">'
      +'<span style="font-size:20px;flex-shrink:0">'+q.icon+'</span>'
      +'<div style="flex:1">'
      +'<div style="color:'+txtH+';font-weight:600">'+q.label+'</div>'
      +'<div style="font-size:11px;color:'+txtS+';margin-top:2px">'+q.q.substring(0,55)+'…</div>'
      +'</div>'
      +'</button>';
  }).join('');

  var resultHtml = '';

    resultHtml = '<div style="text-align:center;padding:30px 0">'
      +'<div style="font-size:28px" class="ai-pulse">🤖</div>'
      +'<div style="color:'+txtS+';font-size:13px;margin-top:12px">Claude analyse votre troupeau...</div>'
      +'</div>';

    resultHtml = '<div style="background:#2e0f0f;border:1px solid #7a1a1a;border-radius:8px;padding:12px;color:#f44336;font-size:13px">'
      +'🔴 '+S._aiError+'</div>';
  } else if (S._aiResult) {
    var formatted = S._aiResult
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^## (.+)$/gm,'<div style="font-size:13px;font-weight:700;color:'+txtA+';margin:10px 0 4px">$1</div>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong style="color:'+txtH+';font-weight:700">$1</strong>')
      .replace(/\*([^*]+)\*/g,'<em style="color:'+txtA+'">$1</em>')
      .replace(/^[-•] (.+)$/gm,'<div style="display:flex;gap:6px;margin:3px 0"><span style="color:'+txtA+';flex-shrink:0">▸</span><span style="color:'+txtR+'">$1</span></div>')
      .replace(/\n\n/g,'<div style="height:8px"></div>')

    resultHtml = '<div style="background:'+bg2+';border:1px solid '+bd1+';border-radius:10px;padding:16px">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid '+bd2+'">'

  var inputHtml = '<div style="margin-top:14px;border-top:1px solid '+bd2+';padding-top:12px">'
    +'<div style="font-size:12px;color:'+txtS+';margin-bottom:6px;font-weight:600">✏️ Votre question :</div>'
    +'<textarea id="ai-question-inp" rows="3" '
    +'placeholder="Ex: Mes bêtes sont-elles sur la bonne trajectoire ? Quand vendre ?" '
    +'style="width:100%;box-sizing:border-box;padding:10px 12px;border-radius:8px;'
    +'border:1px solid '+bdInp+';background:'+bgInp+';color:'+txtIn+';'
    +'font-size:14px;line-height:1.5;resize:vertical;font-family:inherit;margin-bottom:8px">'
    +(S._aiQuestion||'')+'</textarea>'
    +'<button type="button" '
    +'onclick="var i=document.getElementById(\'ai-question-inp\');if(i&&i.value.trim()){S._aiQuestion=i.value;askAI(i.value)}" '
    +'style="width:100%;padding:12px;background:'+bgBtn+';'
    +'border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">'
    +'🤖 Analyser'
    +'</button>'
    +'</div>';

  return '<div class="modal-overlay" onclick="if(event.target===this){S._aiOpen=false;r()}">'
    +'<div style="background:'+bg0+';border:1px solid '+bd1+';border-radius:16px;'
    +'width:90%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;'
    +'margin:auto;position:relative;top:50%;transform:translateY(-50%)">'
    // En-tête
    +'<div style="padding:16px 20px;border-bottom:1px solid '+bd1+';display:flex;justify-content:space-between;align-items:center">'
    +'<div>'
    +'<div style="font-size:16px;font-weight:700;color:'+txtH+'">🤖 Analyse IA — BOANR</div>'
    +'<div style="font-size:12px;color:'+txtS+';margin-top:2px">Assisté par Claude · Données cycle en cours</div>'
    +'</div>'
    +'<button onclick="S._aiOpen=false;S._aiResult=\'\';S._aiError=\'\';r()" '
    +'style="background:none;border:none;color:'+txtS+';font-size:24px;cursor:pointer;line-height:1;padding:4px">×</button>'
    +'</div>'
    // Corps scrollable
    +'<div style="padding:16px 20px;overflow-y:auto;flex:1">'
    +(S._aiResult || S._aiLoading || S._aiError
      ? resultHtml
      : '<div style="font-size:11px;color:'+txtS+';margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">Questions rapides</div>'
        + questionsHtml
    )
    +inputHtml
    +'</div>'

    +'</div>';
}


// Partager la réponse IA sur WhatsApp
function partagerAIWhatsApp() {
  if (!S._aiResult) return;
  var sem = calcSemaine();
  var header = '🤖 *Analyse IA BOANR — Sem. ' + sem + '*\n';
  var msg = encodeURIComponent(header + S._aiResult);
  window.open('https://wa.me/?text=' + msg, '_blank');
}

var PWD_ROLES = [
  { key:'fondateur', label:'Direction (vous)', icon:'👑' },
  { key:'gerant',    label:'Gérant terrain',   icon:'🧑‍🌾' },
  { key:'rga',       label:'RGA',              icon:'📊' },
  { key:'fallou',    label:'Commerciale',      icon:'🏪' },
];

function openPwdManager() {
  S._pwdMgrOpen    = true;
  S._pwdMgrStep    = 'auth';   // 'auth' → 'choose' → 'change' → 'done'
  S._pwdMgrError   = '';
  S._pwdMgrSuccess = '';
  S._pwdMgrCurrent = '';
  S._pwdMgrRole    = '';
  S._pwdMgrNew      = '';
  S._pwdMgrConfirm  = '';
  S._pwdMgrNewLogin = '';
  r();
}

function pwdMgrVerifyFounder() {
  var el = document.getElementById('pwd-mgr-current-inp');
  if(el) S._pwdMgrCurrent = el.value;
  if (!S._pwdMgrCurrent) { S._pwdMgrError = 'Saisir votre mot de passe'; r(); return; }
  S._pwdMgrError = '';

  fetch('/api/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ login: 'fondateur', password: S._pwdMgrCurrent })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (!data.ok) { S._pwdMgrError = 'Mot de passe incorrect'; r(); return; }
    S._pwdMgrStep  = 'choose';
    S._pwdMgrError = '';
    r();
  })
  .catch(function(){ S._pwdMgrError = 'Erreur réseau'; r(); });
}

function pwdMgrSelectRole(role) {
  S._pwdMgrRole     = role;
  S._pwdMgrStep     = 'change';
  S._pwdMgrNew      = '';
  S._pwdMgrConfirm  = '';
  S._pwdMgrNewLogin = '';
  S._pwdMgrError    = '';
  r();
}

function pwdMgrApply() {
  var elNew   = document.getElementById('pwd-mgr-new-inp');
  var elConf  = document.getElementById('pwd-mgr-conf-inp');
  var elLogin = document.getElementById('pwd-mgr-login-inp');
  if(elNew)   S._pwdMgrNew      = elNew.value;
  if(elConf)  S._pwdMgrConfirm  = elConf.value;
  if(elLogin) S._pwdMgrNewLogin = elLogin.value.trim();

  var hasNewPwd   = S._pwdMgrNew && S._pwdMgrNew.length > 0;
  var hasNewLogin = S._pwdMgrNewLogin && S._pwdMgrNewLogin.length > 0;

  if (!hasNewPwd && !hasNewLogin) {
    S._pwdMgrError = 'Saisir un nouvel identifiant et/ou un nouveau mot de passe';
    r(); return;
  }
  if (hasNewPwd && S._pwdMgrNew.length < 6) {
    S._pwdMgrError = 'Mot de passe trop court (6 caractères min)';
    r(); return;
  }
  if (hasNewPwd && S._pwdMgrNew !== S._pwdMgrConfirm) {
    S._pwdMgrError = 'Les mots de passe ne correspondent pas';
    r(); return;
  }
  if (hasNewLogin && !/^[a-z0-9_]{3,}$/.test(S._pwdMgrNewLogin)) {
    S._pwdMgrError = 'Identifiant invalide (3+ caractères, lettres minuscules/chiffres/_)';
    r(); return;
  }
  S._pwdMgrError = '';

  // Appel API pour changer le mot de passe et/ou l'identifiant
  fetch('/api/change-password', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Session-Token': S.sessionToken || ''
    },
    body: JSON.stringify({
      founderPassword: S._pwdMgrCurrent,
      role: S._pwdMgrRole,
      newPassword: hasNewPwd ? S._pwdMgrNew : undefined,
      newLogin: hasNewLogin ? S._pwdMgrNewLogin : undefined
    })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    if (!data.ok) { S._pwdMgrError = data.error || 'Erreur serveur'; r(); return; }
    var roleLabel = PWD_ROLES.find(function(p){ return p.key===S._pwdMgrRole; });
    var label = roleLabel ? roleLabel.label : S._pwdMgrRole;
    var parts = [];
    if (hasNewPwd)   parts.push('mot de passe changé');
    if (hasNewLogin) parts.push('identifiant → ' + S._pwdMgrNewLogin);
    S._pwdMgrSuccess = label + ' : ' + parts.join(' + ') + ' ✓';
    S._pwdMgrStep    = 'done';
    // Si le fondateur change son propre mot de passe → déconnecter
    if (S._pwdMgrRole === 'fondateur' && hasNewPwd) {
      setTimeout(function(){
        S._pwdMgrOpen = false;
        S.page = 'login';
        S.user = null;
        S.tok  = null;
        S.sessionToken = null;
        S.msg  = 'ok:Identifiant/mot de passe changé — reconnectez-vous';
        r();
      }, 2000);
    }
    r();
  })
  .catch(function(){ S._pwdMgrError = 'Erreur réseau'; r(); });
}
