function calcSemaine() {
  if (!CYCLE.dateDebut) return MOCK.sem;

function b64u(str) {
  var b = btoa(unescape(encodeURIComponent(str)));
  return b.replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}
function b64bin(str) {
  var b = btoa(str);
  return b.replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}

function getTok() {
  return new Promise(function(resolve) {
    if (S.tok && Date.now() < S.tokexp-60000) { resolve(S.tok); return; }
    var sa = SA;
    var now = Math.floor(Date.now()/1000);
    var h  = b64u(JSON.stringify({alg:'RS256',typ:'JWT'}));
    var pl = b64u(JSON.stringify({iss:sa.client_email,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now}));
    var si = h+'.'+pl;
    var kd = sa.private_key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
    var arr = atob(kd).split('').map(function(c){return c.charCodeAt(0);});
    var kb = new Uint8Array(arr);
    crypto.subtle.importKey('pkcs8', kb.buffer, {name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'}, false, ['sign'])
    .then(function(ck) { return crypto.subtle.sign('RSASSA-PKCS1-v1_5', ck, new TextEncoder().encode(si)); })
    .then(function(sig) {
      var a = new Uint8Array(sig), s2='';
      for (var i=0;i<a.length;i++) s2+=String.fromCharCode(a[i]);
      var jwt = si+'.'+b64bin(s2);
      return fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion='+jwt});
    })
    .then(function(res){return res.json();})
    .then(function(d){
      if(d.access_token){S.tok=d.access_token;S.tokexp=Date.now()+3600000;}
      resolve(S.tok);
    })
    .catch(function(){resolve(null);});
  });
}

function appendRow(sid, range, vals) {
  return getTok().then(function(tk) {
    if (!tk) return {ok:false, err:'Token invalide'};
    var sheetName = range.split('!')[0];
    var tr = TABLE_RANGES[sheetName];
    if (!tr) {
      // fallback appendRow classique si feuille inconnue
      var url = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+encodeURIComponent(range)+':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
      return fetch(url,{method:'POST',headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json'},body:JSON.stringify({values:[vals]})})
      .then(function(res){return res.json();})
      .then(function(d){return d.error?{ok:false,err:d.error.message}:{ok:true};});
    }
    // Lire colonne A pour trouver la 1ère ligne vide dans le tableau
    var readRange = sheetName+'!A'+tr.start+':A'+tr.end;
    var readUrl = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+encodeURIComponent(readRange);
    return fetch(readUrl, {headers:{Authorization:'Bearer '+tk}})
    .then(function(res){return res.json();})
    .then(function(d){
      var rows = d.values || [];
      var targetLine = Math.min(tr.start + rows.length, tr.end);
      var writeRange = sheetName+'!A'+targetLine;
      var writeUrl = 'https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+encodeURIComponent(writeRange)+'?valueInputOption=USER_ENTERED';
      return fetch(writeUrl, {method:'PUT', headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json'}, body:JSON.stringify({values:[vals]})});
    })
    .then(function(res){return res.json();})
    .then(function(d){return d.error?{ok:false,err:d.error.message}:{ok:true};});
  }).catch(function(e){return{ok:false,err:e.message};});
}

function sparkline(data, color, w, h) {
  if (!data || data.length < 2) return '';
  w = w || 80; h = h || 24;
  var min = Math.min.apply(null, data);
  var max = Math.max.apply(null, data);
  var range = max - min || 1;
  var pts = data.map(function(v, i) {
    var x = (i / (data.length - 1)) * w;
    var y = h - ((v - min) / range) * (h - 4) - 2;
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  return '<svg width="'+w+'" height="'+h+'" style="display:block">'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}

var SWIPE = { x0:0, y0:0, active:false, dir:0 }; // dir: -1=gauche, 1=droite

function initSwipe() {
  var el = document.getElementById('tab-wrap');
  if (!el) return;
  el.addEventListener('touchstart', function(e){
    SWIPE.x0 = e.touches[0].clientX;
    SWIPE.y0 = e.touches[0].clientY;
    SWIPE.active = true;
  }, {passive:true});
  el.addEventListener('touchend', function(e){
    if (!SWIPE.active) return;
    var dx = e.changedTouches[0].clientX - SWIPE.x0;
    var dy = e.changedTouches[0].clientY - SWIPE.y0;
    SWIPE.active = false;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)*1.5) return; // pas assez horizontal
    var utabs = USERS[S.user].tabs;
    var idx = utabs.indexOf(S.tab);
    if (dx < 0 && idx < utabs.length-1) chTabSwipe(utabs[idx+1], 'left');
    if (dx > 0 && idx > 0) chTabSwipe(utabs[idx-1], 'right');
  }, {passive:true});
}

function chTabSwipe(t, dir) {
  // Animer sortie
  var wrap = document.getElementById('tab-content');
  if (wrap) {
    wrap.classList.add(dir==='left' ? 'slide-left' : 'slide-right');
  }
  setTimeout(function(){
    SWIPE.dir = dir==='left' ? -1 : 1;
    chTab(t);
  }, 120);
}

function chTab(t){
  S.tab=t; S.msg=''; S.dd=false;
  S.sub=t==='saisie'?'fiche':t==='livrables'?'treso':t==='marche'?'prix':'';
  r();
  // Animer entrée après rendu
  setTimeout(function(){
    var wrap = document.getElementById('tab-content');
    if (wrap && SWIPE.dir !== 0) {
      wrap.classList.add(SWIPE.dir===-1 ? 'slide-in-left' : 'slide-in-right');
      SWIPE.dir = 0;
    }
    initSwipe();
  }, 10);
}
function chSub(s){S.sub=s;S.msg='';r();setTimeout(initSwipe,10);}

function saveCycle(){

function animateCounters() {
  document.querySelectorAll('[data-count]').forEach(function(el) {
    var target = parseFloat(el.getAttribute('data-count'));
    var decimals = (target % 1 !== 0) ? 1 : 0;
    var duration = 900, start = null;
    function step(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / duration, 1);
      var ease = 1 - Math.pow(1 - p, 3);
      el.textContent = (target * ease).toFixed(decimals);
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = target.toFixed(decimals);
    }
    requestAnimationFrame(step);
  });
}

    form='<div class="card">'+prog
      +fl('Date','<input type="date" value="'+f.date+'" oninput="S.fst.date=this.value">',f.date)
      +fl('Type aliment','<input placeholder=" " value="'+f.type+'" oninput="S.fst.type=this.value">',f.type)
      +'<div class="frow">'
      +fl('Stock (kg)','<input type="number" inputmode="decimal" placeholder=" " value="'+f.kg+'" oninput="S.fst.kg=this.value">',f.kg)
      +fl('Ration/j (kg)','<input type="number" inputmode="decimal" placeholder=" " value="'+f.rat+'" oninput="S.fst.rat=this.value">',f.rat)
      +'</div>'
      +(sem2?'<div class="al '+(parseFloat(sem2)>=6?'al-g':parseFloat(sem2)>=4?'al-o':'al-r')+'">Semaines restantes : <strong>'+sem2+'</strong> — '+(parseFloat(sem2)>=6?'Suffisant':parseFloat(sem2)>=4?'Attention':'CRITIQUE')+'</div>':'')

  } else if(S.sub==='inc'){
    var f=S.fin; if(!f.date)f.date=td;
    var prog=formProgress(countFilled([f.date,f.id,f.type,f.desc]),4);

      +'<div class="frow">'
      +fl('Date','<input type="date" value="'+f.date+'" oninput="S.fin.date=this.value">',f.date)
      +fl('ID bête','<input placeholder=" " value="'+f.id+'" oninput="S.fin.id=this.value">',f.id)
      +'</div>'
      +fl('Type incident','<input placeholder=" " value="'+f.type+'" oninput="S.fin.type=this.value">',f.type)
      +'<div class="fg"><label>Gravité</label><div class="rg">'
      +'<div class="rb '+(f.grav==='1'?'on':'')+'" onclick="S.fin.grav=\'1\';r()">1 Mineur</div>'
      +'<div class="rb '+(f.grav==='2'?'on':'')+'" onclick="S.fin.grav=\'2\';r()">2 Important</div>'
      +'<div class="rb '+(f.grav==='3'?'on':'')+'" onclick="S.fin.grav=\'3\';r()">3 URGENCE</div>'
      +'</div></div>'
      +(f.grav==='3'?'<div class="al al-r">URGENCE — Appeler la direction immediatement</div>':'')
      +(f.grav==='2'?'<div class="al al-o">Important — Prévenir la direction aujourd\'hui</div>':'')

      +fl('Action effectuée','<textarea rows="2" placeholder=" " oninput="S.fin.act=this.value">'+f.act+'</textarea>',f.act)
      +'<div class="fg"><label>Clôturée ?</label>'+yn(f.clos,'clos','fin')+'</div>'
      +'<button '+(S.sending?'disabled':'')+' onclick="doSubmit(\'inc\')">Enregistrer</button>'+msgHtml()+'</div>';
  } else if(S.sub==='pesee'){
    var f=S.fp; if(!f.date)f.date=td;
    var gain2=f.poids&&f.prev?(parseFloat(f.poids)-parseFloat(f.prev)).toFixed(1):null;
    var prog=formProgress(countFilled([f.date,f.id,f.poids]),3);
    form='<div class="card">'+prog
      +'<div class="frow">'
      +fl('Date','<input type="date" value="'+f.date+'" oninput="S.fp.date=this.value">',f.date)
      +fl('ID bête','<input placeholder=" " value="'+f.id+'" oninput="S.fp.id=this.value">',f.id)
      +'</div>'
      +'<div class="fg"><label>Race</label><select oninput="S.fp.race=this.value"><option>Djakoré</option><option>Gobra</option></select></div>'
      +'<div class="frow">'
      +fl('Poids (kg)','<input type="number" inputmode="decimal" placeholder=" " value="'+f.poids+'" oninput="S.fp.poids=this.value">',f.poids)
      +fl('Poids préc. (kg)','<input type="number" inputmode="decimal" placeholder=" " value="'+f.prev+'" oninput="S.fp.prev=this.value">',f.prev)
      +'</div>'
      +(gain2?'<div class="al '+(parseFloat(gain2)>=0?'al-g':'al-r')+'">Gain calculé : <strong>'+gain2+' kg</strong></div>':'')
      +'<button '+(S.sending?'disabled':'')+' onclick="doSubmit(\'pesee\')">Enregistrer</button>'+msgHtml()+'</div>';
  } else if(S.sub==='sante'){
    var f=S.fsa; if(!f.date)f.date=td;
    var prog=formProgress(countFilled([f.date,f.id,f.sym,f.tra]),4);
    form='<div class="card">'+prog
      +'<div class="frow">'
      +fl('Date','<input type="date" value="'+f.date+'" oninput="S.fsa.date=this.value">',f.date)
      +fl('ID bête','<input placeholder=" " value="'+f.id+'" oninput="S.fsa.id=this.value">',f.id)
      +'</div>'
      +fl('Symptôme','<input placeholder=" " value="'+f.sym+'" oninput="S.fsa.sym=this.value">',f.sym)
      +fl('Traitement','<input placeholder=" " value="'+f.tra+'" oninput="S.fsa.tra=this.value">',f.tra)
      +'<div class="frow">'
      +fl('Coût (FCFA)','<input type="number" inputmode="decimal" placeholder=" " value="'+f.cout+'" oninput="S.fsa.cout=this.value">',f.cout)
      +'<div class="fg"><label>Résultat</label><select oninput="S.fsa.res=this.value"><option>Gueri</option><option>En cours</option><option>Non gueri</option></select></div>'
      +'</div>'
      +'<div class="fg"><label>Décès ?</label>'+yn(f.dec,'dec','fsa')+'</div>'
      +(f.dec==='OUI'?'<div class="al al-r">Signaler immédiatement à la direction</div>':'')
      +'<button '+(S.sending?'disabled':'')+' onclick="doSubmit(\'sante\')">Enregistrer</button>'+msgHtml()+'</div>';
  } else if(S.sub==='bilan'){
    var f=S.fb;
    var prog=formProgress(countFilled([f.sem,f.nb,f.stk]),3);
    form='<div class="card">'+prog
      +'<div class="frow">'
      +fl('Semaine N°','<input type="number" inputmode="decimal" placeholder=" " value="'+f.sem+'" oninput="S.fb.sem=this.value">',f.sem)
      +fl('Nb bêtes','<input type="number" inputmode="decimal" placeholder=" " value="'+f.nb+'" oninput="S.fb.nb=this.value">',f.nb)
      +'</div>'
      +'<div class="fg"><label>Tous nourris ?</label>'+yn(f.nou,'nou','fb')+'</div>'
      +fl('Stock alim. (semaines)','<input type="number" inputmode="decimal" step="0.1" placeholder=" " value="'+f.stk+'" oninput="S.fb.stk=this.value">',f.stk)
      +'<div class="fg"><label>Incidents ?</label>'+yn(f.inc,'inc','fb')+'</div>'
      +'<div class="fg"><label>Poids vérifié ?</label>'+yn(f.poi,'poi','fb')+'</div>'
      +fl('Message à la direction','<textarea rows="3" placeholder=" " oninput="S.fb.msg=this.value">'+f.msg+'</textarea>',f.msg)
      +'<button '+(S.sending?'disabled':'')+' onclick="doSubmit(\'bilan\')">Envoyer le bilan</button>'+msgHtml()+'</div>';
  }
  return '<div class="cnt"><div class="subtabs">'+stabs+'</div>'+form+'</div>';
}

function viewMarche(){
  var subs=[['prix','Prix'],['sim','Simulateur'],['reco','Recos']];
  var stabs=subs.map(function(s){return'<div class="stab '+(S.sub===s[0]?'on':'')+'" onclick="chSub(\''+s[0]+'\')">'+s[1]+'</div>';}).join('');
  var view='';
  if(S.sub==='prix'){
    var fm=S.fm;
    view='<div class="stitle">Prix observes</div>'
      +'<div class="mkt"><div><div style="font-size:17px;font-weight:bold">2 000 FCFA/kg</div><div style="font-size:11px;color:#88aa88">Thies — 10/03</div></div><div style="color:#4caf50;font-size:18px">&#8593;</div></div>'
      +'<div class="mkt"><div><div style="font-size:17px;font-weight:bold">2 050 FCFA/kg</div><div style="font-size:11px;color:#88aa88">Tivaouane — 27/02</div></div><div style="color:#4caf50;font-size:18px">&#8593;</div></div>'
      +'<div class="mkt"><div><div style="font-size:17px;font-weight:bold">1 950 FCFA/kg</div><div style="font-size:11px;color:#88aa88">Diourbel — 14/02</div></div><div style="color:#f44336;font-size:18px">&#8595;</div></div>'
      +'<div class="sep"></div>'
      +'<div class="card">'
      +'<div class="frow">'
      +'<div class="fg"><label>Date</label><input type="date" value="'+(S.fm.date||todayISO())+'" oninput="S.fm.date=this.value"></div>'
      +'<div class="fg"><label>Foirail</label><select oninput="S.fm.foi=this.value;r()"><option'+(S.fm.foi==='Thies'||!S.fm.foi?' selected':'')+'>Thies</option><option'+(S.fm.foi==='Tivaouane'?' selected':'')+'>Tivaouane</option><option'+(S.fm.foi==='Diourbel'?' selected':'')+'>Diourbel</option><option'+(S.fm.foi==='Autre'||!['Thies','Tivaouane','Diourbel'].includes(S.fm.foi)&&S.fm.foi?' selected':'')+'>Autre</option></select></div>'
      +'</div>'
      +(S.fm.foi==='Autre'||(!['Thies','Tivaouane','Diourbel',''].includes(S.fm.foi)&&S.fm.foi)
        ?'<div class="fg"><label>Préciser la région</label><input placeholder="Nom du foirail..." value="'+(S.fm.foiCustom||'')+'" oninput="S.fm.foiCustom=this.value"></div>'
        :'')
      +'<div class="frow">'
      +'<div class="fg"><label>Prix bas</label><input type="number" inputmode="decimal" placeholder="FCFA/kg" oninput="S.fm.bas=this.value"></div>'
      +'<div class="fg"><label>Prix moyen</label><input type="number" inputmode="decimal" placeholder="FCFA/kg" oninput="S.fm.moy=this.value"></div>'
      +'</div>'
      +'<div class="fg"><label>Prix haut</label><input type="number" inputmode="decimal" placeholder="FCFA/kg" oninput="S.fm.haut=this.value"></div>'
      +'<button '+(S.sending?'disabled':'')+' onclick="doSubmit(\'marche\')">Enregistrer</button>'+msgHtml()
      +'</div>';
  } else if(S.sub==='sim'){
    var nb=S.sn, sp=S.sp, px=S.spx;
    var ca=nb*sp*px, cout=nb*639000, ben=ca-cout, marge=Math.round((ben/ca)*100);
    var dec,bg,bc,tc;
    if(px<1600){dec='STOP ACHAT';bg='#2e1010';bc='#8a0000';tc='#f44336';}
    else if(px<1900){dec="VENTE D'URGENCE";bg='#2e1010';bc='#8a0000';tc='#f44336';}
    else if(px<2000){dec='ACCEPTABLE';bg='#2e2010';bc='#8a5a00';tc='#ffa040';}
    else if(px<2200){dec='CIBLE ATTEINTE';bg='#1a3a1a';bc='#2d6a2d';tc='#4caf50';}
    else{dec='EXCELLENT';bg='#1a3a1a';bc='#2d6a2d';tc='#4caf50';}
    view='<div class="card">'
      +'<div class="fg"><label>Nb betes : <strong>'+nb+'</strong></label><input type="range" min="100" max="5000" step="50" value="'+nb+'" oninput="S.sn=parseInt(this.value);r()"></div>'
      +'<div class="fg"><label>Poids moyen : <strong>'+sp+' kg</strong></label><input type="range" min="350" max="550" step="5" value="'+sp+'" oninput="S.sp=parseInt(this.value);r()"></div>'
      +'<div class="fg"><label>Prix vente : <strong>'+px.toLocaleString()+' FCFA/kg</strong></label><input type="range" min="1500" max="2500" step="50" value="'+px+'" oninput="S.spx=parseInt(this.value);r()"></div>'
      +'</div>'
      +'<div class="card">'
      +'<div class="sim-row"><span style="color:#88aa88">CA total</span><span style="font-weight:bold">'+fmt(ca)+' FCFA</span></div>'
      +'<div class="sim-row"><span style="color:#88aa88">Cout total</span><span style="font-weight:bold">'+fmt(cout)+' FCFA</span></div>'
      +'<div class="sim-row"><span style="color:#88aa88">Benefice net</span><span style="font-weight:bold;color:'+(ben>0?'#4caf50':'#f44336')+'">'+fmt(ben)+' FCFA</span></div>'
      +'<div class="sim-row"><span style="color:#88aa88">Marge</span><span style="font-weight:bold;color:'+(marge>=40?'#4caf50':marge>=25?'#ff9800':'#f44336')+'">'+marge+'%</span></div>'
      +'<div class="sim-row"><span style="color:#88aa88">Commission Commerciale 2%</span><span style="font-weight:bold">'+fmt(ca*0.02)+' FCFA</span></div>'
      +'</div>'
      +'<div style="background:'+bg+';border:1px solid '+bc+';color:'+tc+';border-radius:8px;padding:12px;text-align:center;font-size:15px;font-weight:bold">'+dec+'</div>';
  } else {
    view='<div class="stitle">Recommandations — Commerciale</div>'
      +'<div class="reco-card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-size:13px;font-weight:bold">Prix / Vente</div><div style="font-size:11px;color:#88bb88;background:#1a3a1a;padding:2px 8px;border-radius:10px">C1</div></div><div style="font-size:12px;color:#aaa;line-height:1.5">Cibler vente oct-dec 2026. Contacter 3 bouchers des aout pour pre-engagement prix.</div><div style="font-size:11px;color:#ffaa40;margin-top:5px">+8-15% CA — <span style="color:#88cc88">En cours</span></div></div>'
      +'<div class="reco-card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-size:13px;font-weight:bold">Acheteurs</div><div style="font-size:11px;color:#88bb88;background:#1a3a1a;padding:2px 8px;border-radius:10px">C1</div></div><div style="font-size:12px;color:#aaa;line-height:1.5">Signer 1 accord cadre avec boucher Thies avant introduction veaux aout 2026.</div><div style="font-size:11px;color:#ffaa40;margin-top:5px">Securisation CA — <span style="color:#88cc88">En cours</span></div></div>'
      +'<div class="reco-card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-size:13px;font-weight:bold">Marche</div><div style="font-size:11px;color:#88bb88;background:#1a3a1a;padding:2px 8px;border-radius:10px">C1-C2</div></div><div style="font-size:12px;color:#aaa;line-height:1.5">Priorite Tivaouane pour vente C1 — prix 5-8% superieurs a Thies sur Djakoré.</div><div style="font-size:11px;color:#ffaa40;margin-top:5px">+5% CA — <span style="color:#88cc88">A initier</span></div></div>';
  }
  return '<div class="cnt"><div class="subtabs">'+stabs+'</div>'+view+'</div>';
}
