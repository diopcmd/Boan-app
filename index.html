<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="theme-color" content="#1e4a1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="BOANR">
    <title>BOANR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f1a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
        #app { min-height: 100vh; }
        .hdr { background: #1e4a1e; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-b { width: 36px; height: 36px; background: #2d6a2d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .tabs { background: #1a3a1a; display: flex; border-bottom: 1px solid #2d4a2d; overflow-x: auto; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 12px 20px; font-size: 14px; color: #88bb88; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; }
        .tab.on { color: #fff; border-bottom-color: #fff; }
        .cnt { padding: 16px; max-width: 600px; margin: 0 auto; }
        .stitle { font-size: 11px; font-weight: 500; color: #88bb88; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 12px; }
        .kgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
        .kcard { background: #1a2e1a; border-radius: 10px; padding: 14px; border: 1px solid #2a4a2a; }
        button { width: 100%; background: #2d6a2d; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: inherit; }
        button:disabled { background: #1a3a1a; color: #445544; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        const USERS = {
            fondateur: { name: "Fondateur", pwd: "boanr2026", tabs: ["dashboard", "saisie", "livrables", "marche"] },
            gerant: { name: "Gerant terrain", pwd: "terrain2026", tabs: ["dashboard", "saisie"] },
            rga: { name: "RGA", pwd: "admin2026", tabs: ["dashboard", "livrables"] },
            fallou: { name: "Fallou", pwd: "marche2026", tabs: ["dashboard", "marche"] },
        };

        const S = {
            user: null,
            tab: "dashboard",
            page: "login",
        };

        function doLogin() {
            const id = document.getElementById("login-id").value;
            const password = document.getElementById("login-password").value;

            if (USERS[id] && USERS[id].pwd === password) {
                S.user = id;
                S.tab = USERS[id].tabs[0];
                renderApp();
            } else {
                alert("Identifiant ou mot de passe incorrect.");
            }
        }

        function changeTab(tab) {
            if (USERS[S.user].tabs.includes(tab)) {
                S.tab = tab;
                renderApp();
            } else {
                alert("Accès non autorisé à cet onglet.");
            }
        }

        function renderApp() {
            const app = document.getElementById("app");

            if (S.page === "login") {
                app.innerHTML = `
                    <div>
                        <h1>Connexion</h1>
                        <input id='login-id' placeholder='Identifiant'>
                        <input id='login-password' type='password' placeholder='Mot de passe'>
                        <button onclick='doLogin()'>Se connecter</button>
                    </div>
                `;
            } else if (S.page === "app") {
                const tabs = USERS[S.user].tabs
                    .map((tab) => `<div onclick='changeTab("${tab}")'>${tab}</div>`)
                    .join("");

                app.innerHTML = `
                    <div>
                        <h1>Bienvenue ${USERS[S.user].name}</h1>
                        <div>${tabs}</div>
                        <div>Contenu de l'onglet: ${S.tab}</div>
                    </div>
                `;
            }
        }

        renderApp();
    </script>
</body>
</html>
