body{background:#0f1a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif}

.lbg{min-height:100vh;background:#0f1a0f;display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:#1a2e1a;border-radius:16px;padding:30px 24px;width:100%;max-width:360px;border:1px solid #2a4a2a}
.logob{width:56px;height:56px;background:#2d6a2d;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:500}
.prog-bar{background:#2a4a2a;border-radius:4px;height:6px;flex:1;margin:0 10px}
.prog-fill{background:#4caf50;border-radius:4px;height:6px}
.badge{background:#1a3a5a;color:#5ab4ff;font-size:11px;padding:3px 10px;border-radius:12px}
.ubtn{background:#2d5a2d;border:none;color:#fff;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;-webkit-tap-highlight-color:transparent;-webkit-appearance:none}
.sim-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a2a1a;font-size:13px}

.reco-card{background:#1a2e1a;border-radius:10px;padding:13px;margin-bottom:10px;border:1px solid #2a4a2a}
.act{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #1a2e1a}
.dot{width:8px;height:8px;border-radius:50%;background:#4caf50;margin-top:5px;flex-shrink:0}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:#2a4a2a;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#2d6a2d;cursor:pointer}

<body>
<div id="app"></div>
<script>
var USERS={
  fondateur:{name:'Fondateur',pwd:'boanr2026',tabs:['dashboard','saisie','livrables','marche']},
  gerant:{name:'Gerant terrain',pwd:'terrain2026',tabs:['dashboard','saisie']},
  rga:{name:'RGA',pwd:'admin2026',tabs:['dashboard','livrables']},
  fallou:{name:'Fallou',pwd:'marche2026',tabs:['dashboard','marche']}
};
var SID={
  fondateur:'1QgixxPoBANi4tbfRuU-VPMiDHRUt-5u3JPKqmrVYu-E',
  gerant:'1NC_xZIcncV-YZXT17cU1s8hzZ5_bQGC4HATg4qyiGG0',
  rga:'17iIwFYlZi2mXRhIrw6UFceb6cxqL6XXS7vpPwA2HPyY',
  fallou:'17_P6yexo5fHWip_rlw6Iv3i80mWO-1TaAa3-cmVRj1o'
};
var MOCK={betes:4,gmq:1.1,stock:6,treso:680000,sem:4,mois:1};
var S={page:'cfg',user:null,tab:'dashboard',sub:'fiche',dd:false,sa:null,jin:'',jerr:'',lid:'',lpw:'',lerr:'',sending:false,msg:'',tok:null,tokexp:0};
S.fi={date:'',nb:'',nourris:'OUI',eau:'OUI',enclos:'OUI',incident:'NON',desc:''};
S.fs={date:'',net:'OUI',des:'OUI',rat:'OUI',eau:'OUI',stk:'OUI',san:'OUI',prob:''};
S.fst={date:'',type:'',kg:'',rat:''};
S.fin={date:'',id:'',type:'',grav:'1',desc:'',act:'',clos:'NON'};
S.fp={date:'',id:'',race:'Djakoré',poids:'',prev:''};
S.fsa={date:'',id:'',sym:'',tra:'',cout:'',res:'Gueri',dec:'NON'};
S.fb={sem:'',nb:'',nou:'OUI',stk:'',inc:'NON',poi:'OUI',msg:''};
S.fm={date:'',foi:'Thies',bas:'',moy:'',haut:''};
S.sn=4;S.sp=466;S.spx=2000;

function fmt(n){return new Intl.NumberFormat('fr-FR').format(Math.round(n));}
function today(){var d=new Date();return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function gc(t,v){if(t==='gmq')return v>=1?'#4caf50':v>=0.8?'#ff9800':'#f44336';if(t==='stk')return v>=6?'#4caf50':v>=4?'#ff9800':'#f44336';if(t==='tr')return v>=600000?'#4caf50':v>=400000?'#ff9800':'#f44336';return'#4caf50';}

function r(){
  var el=document.getElementById('app');
  if(!el)return;
  if(S.page==='cfg'){el.innerHTML=pageCfg();return;}
  if(S.page==='login'){el.innerHTML=pageLogin();return;}
  el.innerHTML=pageApp();
}

function b64u(str){
  var b=btoa(unescape(encodeURIComponent(str)));
  return b.replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}
function b64uBin(str){
  var b=btoa(str);
  return b.replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}

function getTok(){
  return new Promise(function(resolve){
    if(S.tok&&Date.now()<S.tokexp-60000){resolve(S.tok);return;}
    if(!S.sa){resolve(null);return;}
    var sa=S.sa;
    var now=Math.floor(Date.now()/1000);
    var h=b64u(JSON.stringify({alg:'RS256',typ:'JWT'}));
    var pl=b64u(JSON.stringify({iss:sa.client_email,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now}));
    var si=h+'.'+pl;
    var kd=sa.private_key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
    var kb=new Uint8Array(atob(kd).split('').map(function(c){return c.charCodeAt(0);}));
    crypto.subtle.importKey('pkcs8',kb.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']).then(function(ck){
      return crypto.subtle.sign('RSASSA-PKCS1-v1_5',ck,new TextEncoder().encode(si));
    }).then(function(sig){
      var sigArr=new Uint8Array(sig);
      var sigStr='';
      for(var i=0;i<sigArr.length;i++)sigStr+=String.fromCharCode(sigArr[i]);
      var sb=b64uBin(sigStr);
      var jwt=si+'.'+sb;
      return fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion='+jwt});
    }).then(function(res){return res.json();}).then(function(d){
      if(d.access_token){S.tok=d.access_token;S.tokexp=Date.now()+3600000;}
      resolve(S.tok);
    }).catch(function(){resolve(null);});
  });
}

function appendRow(sid,range,vals){
  return getTok().then(function(tk){
    if(!tk)return{ok:false,err:'Token invalide'};
    var url='https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+encodeURIComponent(range)+':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
    return fetch(url,{method:'POST',headers:{Authorization:'Bearer '+tk,'Content-Type':'application/json'},body:JSON.stringify({values:[vals]})}).then(function(res){return res.json();}).then(function(d){
      if(d.error)return{ok:false,err:d.error.message};
      return{ok:true};
    });
  }).catch(function(e){return{ok:false,err:e.message};});
}

function doSubmit(type){
  S.sending=true;S.msg='load';r();
  var td=today();
  var p1,p2;
  if(type==='fiche'){
    var f=S.fi;
    p1=appendRow(SID.gerant,'Fiche_Quotidienne!A:G',[f.date||td,f.nb,f.nourris,f.eau,f.enclos,f.incident,f.desc]);
    p2=p1.then(function(res){if(res.ok)return appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'','','','','','','',f.incident==='OUI'?1:0,'','']);return res;});
  }else if(type==='sop'){
    var f=S.fs;
    p2=appendRow(SID.gerant,'SOP_Check!A:H',[f.date||td,f.net,f.des,f.rat,f.eau,f.stk,f.san,f.prob]);
  }else if(type==='stock'){
    var f=S.fst;
    var sem=f.rat>0?(parseFloat(f.kg)/(parseFloat(f.rat)*7)).toFixed(1):0;
    p1=appendRow(SID.gerant,'Stock_Nourriture!A:F',[f.date||td,f.type,f.kg,f.rat,sem,parseFloat(sem)<6?'OUI':'NON']);
    p2=p1.then(function(res){if(res.ok)return appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'','',f.kg,'','','','','','','']);return res;});
  }else if(type==='inc'){
    var f=S.fin;
    p1=appendRow(SID.gerant,'Incidents!A:G',[f.date||td,f.id,f.type,f.grav,f.desc,f.act,f.clos]);
    p2=p1.then(function(res){if(res.ok&&parseInt(f.grav)>=2)return appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'','','','','','','',1,'','Incident G'+f.grav]);return res;});
  }else if(type==='pesee'){
    var f=S.fp;
    var gain=f.poids&&f.prev?(parseFloat(f.poids)-parseFloat(f.prev)).toFixed(1):'';
    p1=appendRow(SID.gerant,'Pesees!A:G',[f.date||td,f.id,f.race,f.poids,f.prev,gain,gain&&parseFloat(gain)<0?'ALERTE':'OK']);
    p2=p1.then(function(res){if(res.ok)return appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'','','','','',f.poids,'','','','']);return res;});
  }else if(type==='sante'){
    var f=S.fsa;
    p1=appendRow(SID.gerant,'Sante_Mortalite!A:G',[f.date||td,f.id,f.sym,f.tra,f.cout,f.res,f.dec]);
    p2=p1.then(function(res){if(res.ok&&f.dec==='OUI')return appendRow(SID.fondateur,'KPI_Mensuels!A:K',[f.date||td,'DECES','','','','','','',1,'','APPELER FONDATEUR']);return res;});
  }else if(type==='bilan'){
    var f=S.fb;
    var al=f.inc==='OUI'||parseFloat(f.stk)<6?'APPELER CHEIKH':'SEMAINE OK';
    p1=appendRow(SID.gerant,'Hebdomadaire!A:H',['Semaine '+f.sem,f.nb,f.nou,f.stk,f.inc,f.poi,al,f.msg]);
    p2=p1.then(function(res){if(res.ok)return appendRow(SID.fondateur,'KPI_Hebdo!A:J',['S'+f.sem,f.nb,f.stk,'','',f.inc,'',f.nou,'',al]);return res;});
  }else if(type==='marche'){
    var f=S.fm;
    p2=appendRow(SID.fallou,'Suivi_Marche!A:J',[f.date||td,f.foi,f.bas,f.moy,f.haut,'','','-','','']);
  }
  (p2||Promise.resolve({ok:false,err:'Type inconnu'})).then(function(res){
    S.sending=false;
    S.msg=res&&res.ok?'ok':'err:'+(res&&res.err?res.err:'Erreur');
    r();
    setTimeout(function(){S.msg='';r();},4000);
  });
}

function loadSA(){
  try{
    var sa=JSON.parse(S.jin.trim());
    if(!sa.client_email||!sa.private_key){S.jerr='JSON invalide — champs manquants';r();return;}
    S.sa=sa;S.jerr='';S.page='login';r();
  }catch(e){S.jerr='JSON invalide — verifie le format';r();}
}

function doLogin(){
  var id=S.lid.trim().toLowerCase();
  if(USERS[id]&&USERS[id].pwd===S.lpw){
    S.user=id;S.lerr='';S.page='app';
    S.tab=USERS[id].tabs[0];
    S.sub=S.tab==='saisie'?'fiche':S.tab==='livrables'?'treso':S.tab==='marche'?'prix':'';
    r();
  }else{S.lerr='Identifiant ou mot de passe incorrect';r();}
}

function chTab(t){S.tab=t;S.msg='';S.dd=false;S.sub=t==='saisie'?'fiche':t==='livrables'?'treso':t==='marche'?'prix':'';r();}
function chSub(s){S.sub=s;S.msg='';r();}
function swUser(k){S.user=k;S.dd=false;chTab(USERS[k].tabs[0]);}

function yn(val,k,obj){
  return '<div class="rg"><div class="rb '+(val==='OUI'?'on':'')+'" onclick="S.'+obj+'.'+k+'=\'OUI\';r()">OUI</div><div class="rb '+(val==='NON'?'on':'')+'" onclick="S.'+obj+'.'+k+'=\'NON\';r()">NON</div></div>';
}
function msgHtml(){
  if(!S.msg)return'';
  if(S.msg==='load')return'<div class="msg-load">Envoi vers Google Sheets...</div>';
  if(S.msg==='ok')return'<div class="msg-ok">Enregistre dans Google Sheets !</div>';
  return'<div class="msg-err">Erreur : '+S.msg.replace('err:','')+'</div>';
}

function pageCfg(){
  return '<div class="lbg"><div class="lcard"><div style="text-align:center;margin-bottom:20px"><div class="logob">B</div><div style="font-size:20px;font-weight:500;margin-top:8px">BOANR</div><div style="font-size:13px;color:#88aa88;margin-top:4px">Colle ton fichier JSON service account</div></div><div class="fg"><textarea class="fi" rows="7" style="font-size:12px;font-family:monospace;resize:vertical" placeholder=\'{"type":"service_account",...}\' oninput="S.jin=this.value">'+S.jin+'</textarea></div>'+(S.jerr?'<div class="msg-err">'+S.jerr+'</div>':'')+'<button class="btn" onclick="loadSA()">Connecter</button><div style="margin-top:12px;font-size:11px;color:#445544;text-align:center">Cle stockee uniquement en memoire</div></div></div>';
}

function pageLogin(){
  return '<div class="lbg"><div class="lcard"><div style="text-align:center;margin-bottom:22px"><div class="logob">B</div><div style="font-size:22px;font-weight:500;margin-top:8px">BOANR</div><div style="font-size:13px;color:#88aa88;margin-top:4px">Gestion elevage bovin</div></div><div class="fg"><label class="fl">Identifiant</label><input class="fi" placeholder="ex: gerant" value="'+S.lid+'" oninput="S.lid=this.value"></div><div class="fg"><label class="fl">Mot de passe</label><input class="fi" type="password" value="'+S.lpw+'" oninput="S.lpw=this.value"></div>'+(S.lerr?'<div class="msg-err">'+S.lerr+'</div>':'')+'<button class="btn" style="margin-top:6px" onclick="doLogin()">Se connecter</button><div style="margin-top:14px;font-size:11px;color:#445544;text-align:center">fondateur · gerant · rga · fallou</div></div></div>';
}

function pageApp(){
  var tnames={dashboard:'Dashboard',saisie:'Saisie',livrables:'Livrables',marche:'Marche'};
  var utabs=USERS[S.user].tabs;
  var tabsHtml=utabs.map(function(t){return'<div class="tab '+(S.tab===t?'on':'')+'" onclick="chTab(\''+t+'\')">'+tnames[t]+'</div>';}).join('');
  var content='';
  if(S.tab==='dashboard')content=viewDash();
  else if(S.tab==='saisie')content=viewSaisie();
  else if(S.tab==='livrables')content=viewLiv();
  else content=viewMarche();
  var ddHtml='';
  if(S.dd){
    ddHtml='<div class="dd">';
    Object.keys(USERS).forEach(function(k){ddHtml+='<div class="ddi '+(S.user===k?'on':'')+'" onclick="swUser(\''+k+'\')">'+USERS[k].name+'<br><span style="font-size:11px;color:#88bb88">'+USERS[k].tabs.join(' · ')+'</span></div>';});
    ddHtml+='<div class="ddi" style="color:#ff7070" onclick="S.page=\'login\';S.user=null;S.dd=false;r()">Deconnexion</div></div>';
  }
  return '<div onclick="if(S.dd&&!event.target.closest(\'.ubtn\')&&!event.target.closest(\'.dd\')){S.dd=false;r()}"><div class="hdr"><div class="logo"><div class="logo-b">B</div><div><div style="font-size:18px;font-weight:500">BOANR</div><div style="font-size:11px;color:#88bb88">Cycle 1 — Sem. '+MOCK.sem+'</div></div></div><div style="position:relative"><button class="ubtn" onclick="S.dd=!S.dd;r()">'+USERS[S.user].name+' &#9660;</button>'+ddHtml+'</div></div><div class="tabs">'+tabsHtml+'</div>'+content+'</div>';
}

function viewMarche(){
  var subs=[['prix','Prix'],['sim','Simulateur'],['reco','Recos']];
  var stabs=subs.map(function(s){return'<div class="stab '+(S.sub===s[0]?'on':'')+'" onclick="chSub(\''+s[0]+'\')">'+s[1]+'</div>';}).join('');
  var view='';
  var fm=S.fm;
  if(S.sub==='prix'){
    view='<div class="stitle">Prix observes</div><div class="mkt"><div><div style="font-size:17px;font-weight:500">2 000 FCFA/kg</div><div style="font-size:11px;color:#88aa88">Thies — 10/03</div></div><div style="color:#4caf50;font-size:16px">&#8593;</div></div><div class="mkt"><div><div style="font-size:17px;font-weight:500">2 050 FCFA/kg</div><div style="font-size:11px;color:#88aa88">Tivaouane — 27/02</div></div><div style="color:#4caf50;font-size:16px">&#8593;</div></div><div class="mkt"><div><div style="font-size:17px;font-weight:500">1 950 FCFA/kg</div><div style="font-size:11px;color:#88aa88">Diourbel — 14/02</div></div><div style="color:#f44336;font-size:16px">&#8595;</div></div><div class="sep"></div><div class="card"><div class="frow"><div class="fg"><label class="fl">Date</label><input type="date" class="fi" value="'+fm.date+'" oninput="S.fm.date=this.value"></div><div class="fg"><label class="fl">Foirail</label><select class="fi" oninput="S.fm.foi=this.value"><option>Thies</option><option>Tivaouane</option><option>Diourbel</option><option>Autre</option></select></div></div><div class="frow"><div class="fg"><label class="fl">Prix bas</label><input type="number" class="fi" oninput="S.fm.bas=this.value"></div><div class="fg"><label class="fl">Prix moyen</label><input type="number" class="fi" oninput="S.fm.moy=this.value"></div></div><div class="fg"><label class="fl">Prix haut</label><input type="number" class="fi" oninput="S.fm.haut=this.value"></div><button class="btn" '+(S.sending?'disabled':'')+' onclick="doSubmit(\'marche\')">Enregistrer</button>'+msgHtml()+'</div>';
  }else if(S.sub==='sim'){
    var nb=S.sn,sp=S.sp,px=S.spx;
    var ca=nb*sp*px,cout=nb*639000,ben=ca-cout,marge=Math.round((ben/ca)*100);
    var dec,bg,bc,tc;
    if(px<1600){dec='STOP ACHAT';bg='#2e1010';bc='#8a0000';tc='#f44336';}
    else if(px<1900){dec="VENTE D'URGENCE";bg='#2e1010';bc='#8a0000';tc='#f44336';}
    else if(px<2000){dec='ACCEPTABLE';bg='#2e2010';bc='#8a5a00';tc='#ffa040';}
    else if(px<2200){dec='CIBLE ATTEINTE';bg='#1a3a1a';bc='#2d6a2d';tc='#4caf50';}
    else{dec='EXCELLENT';bg='#1a3a1a';bc='#2d6a2d';tc='#4caf50';}
    view='<div class="card"><div class="fg"><label class="fl">Nb betes : <strong>'+nb+'</strong></label><input type="range" min="1" max="20" step="1" value="'+nb+'" oninput="S.sn=parseInt(this.value);r()"></div><div class="fg"><label class="fl">Poids moyen : <strong>'+sp+' kg</strong></label><input type="range" min="350" max="550" step="5" value="'+sp+'" oninput="S.sp=parseInt(this.value);r()"></div><div class="fg"><label class="fl">Prix vente : <strong>'+px.toLocaleString()+' FCFA/kg</strong></label><input type="range" min="1500" max="2500" step="50" value="'+px+'" oninput="S.spx=parseInt(this.value);r()"></div></div><div class="card"><div class="sim-row"><span style="color:#88aa88">CA total</span><span style="font-weight:500">'+fmt(ca)+' FCFA</span></div><div class="sim-row"><span style="color:#88aa88">Cout total</span><span style="font-weight:500">'+fmt(cout)+' FCFA</span></div><div class="sim-row"><span style="color:#88aa88">Benefice net</span><span style="font-weight:500;color:'+(ben>0?'#4caf50':'#f44336')+'">'+fmt(ben)+' FCFA</span></div><div class="sim-row"><span style="color:#88aa88">Marge</span><span style="font-weight:500;color:'+(marge>=40?'#4caf50':marge>=25?'#ff9800':'#f44336')+'">'+marge+'%</span></div><div class="sim-row"><span style="color:#88aa88">Commission 2%</span><span style="font-weight:500">'+fmt(ca*0.02)+' FCFA</span></div></div><div style="background:'+bg+';border:1px solid '+bc+';color:'+tc+';border-radius:8px;padding:10px;text-align:center;font-size:14px;font-weight:500">'+dec+'</div>';
  }else{
    view='<div class="stitle">Recommandations</div><div class="reco-card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-size:13px;font-weight:500">Prix/Vente</div><div style="font-size:11px;color:#88bb88;background:#1a3a1a;padding:2px 8px;border-radius:10px">C1</div></div><div style="font-size:12px;color:#aaa;line-height:1.5">Cibler vente oct-dec 2026. Contacter 3 bouchers des aout.</div><div style="font-size:11px;color:#ffaa40;margin-top:5px">+8-15% CA — <span style="color:#88cc88">En cours</span></div></div><div class="reco-card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-size:13px;font-weight:500">Acheteurs</div><div style="font-size:11px;color:#88bb88;background:#1a3a1a;padding:2px 8px;border-radius:10px">C1</div></div><div style="font-size:12px;color:#aaa;line-height:1.5">Signer 1 accord cadre avec boucher Thies avant introduction.</div><div style="font-size:11px;color:#ffaa40;margin-top:5px">Securisation CA — <span style="color:#88cc88">En cours</span></div></div>';
  }
  return'<div class="cnt"><div class="subtabs">'+stabs+'</div>'+view+'</div>';
}
